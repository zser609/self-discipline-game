<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#a78bfa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>自律大陆 · Discipline Realm</title>
<style>
:root{--bg:#0a0a18;--bg2:#111128;--surface:#18183a;--surface2:#1f1f4d;--border:#2e2e60;--text:#ececfa;--text2:#8a8ab8;--primary:#7c5cfc;--primary-glow:rgba(124,92,252,.35);--primary2:#5ce0b8;--primary2-glow:rgba(92,224,184,.35);--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--gold:#f59e0b;--gold-glow:rgba(245,158,11,.35);--radius:16px;--radius-sm:12px;--shadow:0 4px 30px rgba(0,0,0,.5);--shadow-sm:0 2px 10px rgba(0,0,0,.35);--shadow-lg:0 12px 40px rgba(0,0,0,.6);--font:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;padding:14px;padding-bottom:90px;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse at 50% 0%,rgba(124,92,252,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(92,224,184,.04) 0%,transparent 50%)}
.app{width:100%;max-width:520px;display:flex;flex-direction:column;gap:14px}

/* ===== TOPBAR ===== */
.topbar{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(24,24,58,.9),rgba(20,20,45,.95));border-radius:var(--radius);padding:14px 18px;box-shadow:0 4px 20px rgba(0,0,0,.35);flex-wrap:wrap;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);position:sticky;top:14px;z-index:50;border:1px solid rgba(124,92,252,.1)}
.topbar .mini{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.topbar .val{font-weight:800;font-size:17px;transition:transform .2s ease}
.topbar .val.pulse{animation:valPulse .4s cubic-bezier(.4,0,.2,1)}
@keyframes valPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.topbar .gold{color:var(--gold);text-shadow:0 0 12px var(--gold-glow)}.topbar .cyan{color:var(--primary2);text-shadow:0 0 10px var(--primary2-glow)}.topbar .purple{color:var(--primary);text-shadow:0 0 10px var(--primary-glow)}
.topbar .sep{width:1px;height:24px;background:linear-gradient(transparent,var(--border),transparent);border-radius:1px}
.topbar .topbar-icon{font-size:18px;animation:iconFloat 3s ease-in-out infinite}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.topbar .signin-btn{margin-left:auto;padding:9px 22px;font-size:13px;border-radius:24px;border:2px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;font-weight:700;transition:all .3s cubic-bezier(.4,0,.2,1);letter-spacing:.3px;position:relative;overflow:hidden}
.topbar .signin-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--gold),#fbbf24);opacity:0;transition:opacity .3s}
.topbar .signin-btn:hover::after{opacity:1}
.topbar .signin-btn:hover{color:#000;transform:translateY(-2px);box-shadow:0 6px 24px var(--gold-glow);border-color:transparent}
.topbar .signin-btn:active{transform:translateY(0) scale(.97)}
.topbar .signin-btn.done{border-color:var(--success);color:var(--success);cursor:default}
.topbar .signin-btn.done::after{display:none}
.topbar .signin-btn.done:hover{transform:none;box-shadow:none;border-color:var(--success);color:var(--success)}

/* ===== NAVIGATION ===== */
.nav{display:flex;gap:3px;background:linear-gradient(135deg,rgba(24,24,58,.85),rgba(20,20,45,.9));border-radius:var(--radius);padding:5px;box-shadow:0 4px 16px rgba(0,0,0,.3);position:sticky;top:76px;z-index:49;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid rgba(124,92,252,.08)}
.nav-btn{flex:1;padding:11px 5px;border:none;background:transparent;color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;letter-spacing:.2px;position:relative;z-index:0}
.nav-btn::before{content:'';position:absolute;inset:0;border-radius:var(--radius-sm);background:var(--primary);opacity:0;z-index:-1;transition:opacity .25s}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:#fff;transform:scale(1.04)}
.nav-btn.active::before{opacity:1;box-shadow:0 4px 16px var(--primary-glow)}

/* ===== CARDS ===== */
.card{background:linear-gradient(135deg,var(--surface),var(--surface2));border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-bottom:12px;border:1px solid rgba(255,255,255,.03);transition:all .3s cubic-bezier(.4,0,.2,1)}
.card:hover{box-shadow:0 8px 32px rgba(0,0,0,.45);border-color:rgba(124,92,252,.12)}
.card h2{font-size:16px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:.2px}
.card-sm{padding:14px;margin-bottom:8px}

/* ===== TAB CONTENT ===== */
.tab-content{display:none}.tab-content.active{display:block;animation:tabIn .35s cubic-bezier(.4,0,.2,1)}
@keyframes tabIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== CATEGORY MODULES ===== */
.cat-module{border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.04);overflow:hidden;margin-bottom:10px;background:var(--bg2);transition:all .3s ease}
.cat-module:hover{border-color:rgba(92,224,184,.15);box-shadow:0 4px 16px rgba(92,224,184,.05)}
.cat-module .cat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;font-weight:700;font-size:13px;transition:background .2s}
.cat-module .cat-header:hover{background:rgba(255,255,255,.02)}
.cat-module .cat-header .arrow{transition:transform .3s cubic-bezier(.4,0,.2,1);font-size:11px;margin-left:auto;opacity:.4}
.cat-module.collapsed .cat-body{display:none}
.cat-module.collapsed .cat-header .arrow{transform:rotate(-90deg)}
.cat-module .cat-body{padding:4px 0}
.cat-module .cat-progress{font-size:10px;margin-left:auto;margin-right:8px;opacity:.6;color:var(--text2);padding:2px 8px;border-radius:8px;background:rgba(255,255,255,.03)}

/* ===== TASK ROWS ===== */
.task-row{display:flex;align-items:center;gap:12px;padding:11px 16px;transition:all .25s ease;border-radius:10px;margin:2px 4px;position:relative}
.task-row:hover{background:rgba(124,92,252,.06)}
.task-row.done{opacity:.45}.task-row.done .task-name{text-decoration:line-through}
.task-row.completing{animation:taskComplete .5s ease}
@keyframes taskComplete{0%{background:rgba(16,185,129,.15);transform:scale(1.02)}100%{background:transparent;transform:scale(1)}}
.task-row .task-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;transition:transform .3s ease}
.task-row:hover .task-icon{transform:scale(1.15)}
.task-row .task-info{flex:1;min-width:0}.task-row .task-name{font-weight:600;font-size:13px;line-height:1.4}
.task-row .task-meta{font-size:10px;color:var(--text2);margin-top:3px}
.task-row .task-score{font-weight:700;font-size:11px;white-space:nowrap;flex-shrink:0;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.04);transition:all .3s ease}
.task-row .task-score.pos{color:var(--success)}.task-row .task-score.neg{color:var(--danger)}
.task-row .task-act{flex-shrink:0}
.task-type-tag{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:700;letter-spacing:.3px}
.task-type-tag.t1{background:rgba(124,92,252,.15);color:#c4b5fd}
.task-type-tag.t2{background:rgba(92,224,184,.12);color:#6ee7b7}

/* ===== CHECKBOX ===== */
.check-row{display:flex;align-items:center;gap:8px;font-size:12px}
.check-row input[type=checkbox]{accent-color:var(--primary);width:18px;height:18px;border-radius:4px;cursor:pointer}

/* ===== BUTTONS ===== */
.btn{padding:9px 18px;border:none;border-radius:22px;cursor:pointer;font-weight:700;font-size:13px;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;letter-spacing:.3px;display:inline-flex;align-items:center;gap:5px;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .2s}
.btn:hover::after{opacity:1}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.35)}
.btn:active{transform:translateY(0) scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),#9b7cfc);color:#fff;box-shadow:0 4px 16px var(--primary-glow)}
.btn-primary:hover{box-shadow:0 8px 28px var(--primary-glow)}
.btn-success{background:linear-gradient(135deg,var(--success),#34d399);color:#fff}
.btn-danger{background:linear-gradient(135deg,var(--danger),#f87171);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);background:rgba(124,92,252,.06)}
.btn-sm{padding:6px 14px;font-size:11px;border-radius:16px}
.btn-xs{padding:4px 11px;font-size:10px;border-radius:12px;font-weight:600}
.btn-gold{background:linear-gradient(135deg,var(--gold),#fbbf24);color:#000;font-weight:800}

/* ===== PROGRESS BARS ===== */
.progress-bar{height:8px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative}
.progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.progress-fill.accent{background:linear-gradient(90deg,var(--primary),var(--primary2))}
.progress-fill.gold{background:linear-gradient(90deg,var(--gold),#fbbf24)}

/* ===== XP BAR ===== */
.xp-bar{height:7px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden;margin-top:6px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary2));border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.xp-text{font-size:10px;color:var(--text2);margin-top:3px;font-weight:500}
.xp-section{margin-top:8px}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:100;justify-content:center;align-items:center;padding:20px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.modal-overlay.show{display:flex;animation:overlayIn .25s ease}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.modal{background:linear-gradient(135deg,var(--surface),var(--surface2));border-radius:var(--radius);padding:26px;box-shadow:0 24px 80px rgba(0,0,0,.6);width:100%;max-width:440px;max-height:85dvh;overflow-y:auto;animation:modalIn .3s cubic-bezier(.4,0,.2,1);border:1px solid rgba(255,255,255,.04)}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h2{margin-bottom:18px;font-size:19px;font-weight:800}
.modal::-webkit-scrollbar{width:4px}.modal::-webkit-scrollbar-track{background:transparent}.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== FORMS ===== */
.form-g{margin-bottom:14px}
.form-g label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.form-g input,.form-g select,.form-g textarea{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;transition:all .25s ease}
.form-g input:focus,.form-g select:focus,.form-g textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.form-g textarea{resize:vertical;min-height:60px}
.form-row{display:flex;gap:10px}.form-row .form-g{flex:1}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}

/* ===== TOAST ===== */
.toast{position:fixed;top:20px;right:20px;background:var(--surface);border-left:4px solid var(--primary);border-radius:var(--radius-sm);padding:14px 18px;z-index:200;animation:toastIn .35s cubic-bezier(.4,0,.2,1),toastOut .4s 2.5s ease forwards;box-shadow:0 12px 40px rgba(0,0,0,.6);max-width:320px}
.toast.success{border-left-color:var(--success)}
.toast.error{border-left-color:var(--danger)}
.toast .tt{font-weight:700;font-size:13px}.toast .tm{font-size:12px;color:var(--text2);margin-top:3px}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes toastOut{to{opacity:0;transform:translateY(-10px)}}

/* ===== CALENDAR ===== */
.cal-heat{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:6px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:11px;font-weight:700;cursor:default;position:relative;transition:all .2s ease}
.cal-cell:hover{transform:scale(1.1);z-index:2}
.cal-cell.header{background:transparent;font-size:10px;color:var(--text2);font-weight:400}
.cal-cell.header:hover{transform:none}
.cal-cell.empty{background:transparent}
.cal-cell.today{box-shadow:0 0 0 2px var(--primary);border-radius:8px;animation:todayPulse 2s ease-in-out infinite}
@keyframes todayPulse{0%,100%{box-shadow:0 0 0 2px var(--primary)}50%{box-shadow:0 0 0 3px var(--primary),0 0 12px var(--primary-glow)}}
.cal-cell[data-pct="0"]{background:rgba(255,255,255,.03);color:var(--text2)}
.cal-cell[data-pct="1"]{background:rgba(16,185,129,.12);color:var(--success)}
.cal-cell[data-pct="2"]{background:rgba(16,185,129,.3);color:var(--success)}
.cal-cell[data-pct="3"]{background:rgba(16,185,129,.5);color:#fff}
.cal-cell[data-pct="4"]{background:rgba(16,185,129,.7);color:#fff}

/* ===== ACHIEVEMENTS ===== */
.ach-grid{display:flex;gap:10px;flex-wrap:wrap}
.ach-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 20px;border-radius:var(--radius-sm);border:1px solid var(--border);min-width:80px;transition:all .3s ease}
.ach-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.ach-card.locked{opacity:.3;filter:grayscale(1)}
.ach-card.unlocked{border-color:var(--primary);background:rgba(124,92,252,.1);box-shadow:0 4px 20px rgba(124,92,252,.15);animation:achGlow 3s ease-in-out infinite}
@keyframes achGlow{0%,100%{box-shadow:0 4px 20px rgba(124,92,252,.15)}50%{box-shadow:0 4px 30px rgba(124,92,252,.3)}}
.ach-card .ach-icon{font-size:32px}.ach-card .ach-name{font-size:10px;font-weight:700;text-align:center}

/* ===== SECTION TITLES ===== */
.section-title{font-size:11px;font-weight:800;color:var(--primary);margin:18px 0 10px;padding-bottom:7px;border-bottom:2px solid rgba(124,92,252,.15);text-transform:uppercase;letter-spacing:.8px}

/* ===== CATEGORY CHIPS ===== */
.cat-chips{display:flex;gap:6px;flex-wrap:wrap}
.cat-chip{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:18px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg2);transition:all .2s ease}
.cat-chip:hover{border-color:var(--primary)}
.cat-chip .cat-del{margin-left:4px;cursor:pointer;opacity:.4;font-size:14px;transition:all .2s}
.cat-chip .cat-del:hover{opacity:1;color:var(--danger);transform:scale(1.2)}

/* ===== SETTINGS ===== */
.setting-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid var(--border);transition:all .2s ease}
.setting-row:hover{border-color:rgba(255,255,255,.06)}
.setting-row .sr-info{flex:1;min-width:0}
.setting-row .sr-name{font-weight:600;font-size:13px}.setting-row .sr-meta{font-size:11px;color:var(--text2)}

/* ===== PENALTY EDITOR ===== */
.penalty-editor{background:var(--bg);border-radius:var(--radius-sm);padding:16px;margin-top:8px;border:1px solid var(--border)}
.penalty-editor label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.penalty-editor input,.penalty-editor select{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);font-size:13px;margin-bottom:8px;transition:border-color .2s}
.penalty-editor input:focus,.penalty-editor select:focus{outline:none;border-color:var(--primary)}
.penalty-editor .row{display:flex;gap:10px}.penalty-editor .row>*{flex:1}

/* ===== SKILL TREE ===== */
.tree-container{display:flex;flex-direction:column;align-items:center;gap:20px;padding:10px 0}
.tree-node-wrapper{display:flex;flex-direction:column;align-items:center;position:relative}
.tree-node-wrapper.root{margin-bottom:8px}
.tree-node-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border-radius:var(--radius);padding:16px;border:1px solid var(--border);text-align:center;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);min-width:100px;position:relative;will-change:transform}
.tree-node-card::before{content:'';position:absolute;inset:-1px;border-radius:var(--radius);background:linear-gradient(135deg,var(--primary),var(--primary2));opacity:0;z-index:-1;transition:opacity .3s}
.tree-node-card:hover::before{opacity:.15}
.tree-node-card:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.45)}
.tree-node-card.mastered{border-color:rgba(92,224,184,.3);background:linear-gradient(135deg,rgba(92,224,184,.06),rgba(92,224,184,.02))}
.tree-node-card.mastered::before{background:linear-gradient(135deg,var(--primary2),#34d399);opacity:.1}
.tree-node-card .node-icon{font-size:32px;margin-bottom:6px;transition:transform .3s ease}
.tree-node-card:hover .node-icon{transform:scale(1.1)}
.tree-node-card .node-name{font-weight:700;font-size:14px}.tree-node-card .node-source{font-size:10px;color:var(--text2);margin-top:2px}
.tree-node-card .node-mastered-badge{display:inline-block;background:var(--primary2);color:#000;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:700;margin-top:5px}
.node-actions{margin-top:8px;display:flex;gap:4px;justify-content:center}
.tree-node-children{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:16px;padding-top:16px;border-top:2px dashed rgba(255,255,255,.06)}
.tree-connector{width:3px;height:18px;background:linear-gradient(transparent,var(--border),transparent);margin:0 auto;border-radius:2px}
.tree-node-wrapper.root>.tree-connector{display:none}

/* ===== GOALS ===== */
.goal-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border-radius:var(--radius);padding:18px;border:1px solid rgba(255,255,255,.03);margin-bottom:12px;transition:all .3s ease}
.goal-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.4);border-color:rgba(124,92,252,.1)}
.goal-card .goal-title{font-weight:700;font-size:15px;margin-bottom:8px}
.goal-card .goal-phases{margin-top:10px}
.phase-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.phase-cell{padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;background:var(--bg2);transition:all .25s ease}
.phase-cell:hover{transform:translateY(-2px)}
.phase-cell.completed{border-color:var(--success);background:rgba(16,185,129,.08)}
.phase-icon{font-size:15px}.phase-title{font-weight:600}.phase-reward{font-size:10px;color:var(--text2)}
.phase-check{margin-top:5px}
.monitor-inline{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:12px;color:var(--text2);border-top:1px dashed var(--border)}
.monitor-inline a{color:var(--primary2);text-decoration:none;font-weight:600}
.monitor-inline a:hover{text-decoration:underline}

/* ===== EMOJI PICKER ===== */
.emoji-picker-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:150;justify-content:center;align-items:center}
.emoji-picker-overlay.show{display:flex}.emoji-picker{background:var(--surface);border-radius:var(--radius);padding:18px;max-width:340px;width:100%;max-height:80dvh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}.emoji-picker-close{background:none;border:none;color:var(--text);cursor:pointer;font-size:18px;float:right}.emoji-picker-header{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}.emoji-picker-cat{padding:5px 10px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:11px;font-weight:600;transition:all .2s}.emoji-picker-cat.active{background:var(--primary);color:#fff;border-color:var(--primary)}.emoji-picker-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}.emoji-picker-item{font-size:22px;padding:6px;text-align:center;cursor:pointer;border-radius:8px;transition:all .15s}.emoji-picker-item:hover{background:rgba(124,92,252,.2);transform:scale(1.2)}
.emoji-input-wrap{display:flex;align-items:center;gap:6px}.emoji-icon-trigger{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);cursor:pointer;font-size:16px;padding:9px 12px;transition:all .2s}.emoji-icon-trigger:hover{border-color:var(--primary);background:rgba(124,92,252,.1)}

/* ===== SKILL MODAL ROW ===== */
.skill-node-modal-row{display:flex;gap:8px;align-items:center}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:48px 24px;color:var(--text2);font-size:13px;opacity:.8}
.empty-state .icon{font-size:48px;margin-bottom:12px;display:block;animation:emptyBounce 2s ease-in-out infinite}
@keyframes emptyBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.miss-counter{font-size:11px;color:var(--warning);font-weight:600}.miss-counter.danger{color:var(--danger)}

/* ===== BACKUP SECTION ===== */
.backup-section{padding:16px;background:var(--bg);border-radius:var(--radius-sm);border:1px dashed var(--border);margin-top:12px;text-align:center}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  body{padding:8px;padding-bottom:96px}
  .nav{position:fixed;bottom:10px;left:10px;right:10px;z-index:100;top:auto;border-radius:var(--radius);box-shadow:0 -6px 30px rgba(0,0,0,.5);padding:4px}
  .nav-btn{font-size:10px;padding:10px 2px;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .topbar{padding:12px 14px;font-size:12px;gap:8px}
  .card{padding:16px}
  .task-row{padding:10px 12px;gap:8px}
  .modal{max-width:100%;margin:0 8px;padding:20px}
  .tree-node-children{gap:12px}
  .tree-node-card{min-width:80px;padding:12px}
  .emoji-picker{max-width:95vw}
}

.skill-action-bar{display:none;position:sticky;bottom:0;background:linear-gradient(135deg,rgba(24,24,58,.98),rgba(20,20,45,.98));border-radius:var(--radius) var(--radius) 0 0;padding:10px 16px;z-index:55;border-top:2px solid var(--primary);align-items:center;gap:10px;flex-wrap:wrap;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);margin-top:8px}
.skill-action-bar.show{display:flex}
.skill-action-name{font-weight:700;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.skill-action-btns{display:flex;gap:6px;flex-shrink:0}

.emoji-picker-overlay.show{touch-action:manipulation}
.emoji-picker-item{-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.emoji-picker-cat{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#skill-canvas{touch-action:manipulation}

.skill-zoom-btn{width:26px;height:26px;padding:0!important;border-radius:13px!important;font-size:14px;line-height:1;min-width:0!important}

.cat-icon-btn{-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:border-color .2s,background .2s}
.cat-icon-btn:hover{border-color:var(--primary);background:rgba(124,92,252,.1)}



.dash-panel{background:var(--surface);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--border)}
.dash-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text)}
.dash-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px;color:var(--text2)}
.dash-row:last-child{border-bottom:none}
.dash-val{font-weight:700;color:var(--text)}
@media(max-width:600px){
  .dash-panel{padding:10px}
  .dash-row{font-size:11px}
}

.batch-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--primary);border-radius:var(--radius-sm);margin-bottom:8px;position:sticky;top:76px;z-index:50;flex-wrap:wrap}
#batch-toggle-btn.active{background:var(--primary);color:#fff}
@media(max-width:600px){.batch-bar{gap:4px;padding:6px 8px;font-size:10px}}</style>

<div style="position:absolute;bottom:8px;right:8px;z-index:10;display:flex;gap:3px"><button class="btn btn-xs btn-outline" onclick="skillScale=Math.min(3,skillScale*1.2);if(typeof drawSkillGraph=='function')drawSkillGraph()" style="width:26px;height:26px;padding:0;border-radius:13px;font-size:14px;line-height:1;min-width:0">+</button><button class="btn btn-xs btn-outline" onclick="skillScale=Math.max(.3,skillScale*.8);if(typeof drawSkillGraph=='function')drawSkillGraph()" style="width:26px;height:26px;padding:0;border-radius:13px;font-size:14px;line-height:1;min-width:0">-</button><button class="btn btn-xs btn-outline" onclick="skillScale=1;if(typeof drawSkillGraph=='function')drawSkillGraph()" style="width:26px;height:26px;padding:0;border-radius:13px;font-size:10px;line-height:1;min-width:0">1:1</button></div></div>
<div class="skill-action-bar" id="skill-action-bar"><span class="skill-action-name" id="skill-action-name"></span><div class="skill-action-btns"><button class="btn btn-primary btn-xs" onclick="doSkillAction('add')">+ 添加分支</button><button class="btn btn-outline btn-xs" id="skill-action-master" onclick="doSkillAction('master')">✔ 标记掌握</button><button class="btn btn-danger btn-xs" onclick="doSkillAction('delete')">✖ 删除</button></div></div><div style="display:flex;gap:10px;margin-top:10px;"><button class="btn btn-primary btn-sm" onclick="openSkillNodeModal(null)">+ 种下根技能</button><button class="btn btn-outline btn-sm" onclick="resetSkillGraph()">🔄 重置布局</button></div></div>

      <button type="button" id="new-cat-icon-btn" class="cat-icon-btn" onclick="openEmojiPicker('new-cat-icon')" title="选择图标" style="padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;font-size:18px;min-width:44px;text-align:center">📁</button>
      <input type="hidden" id="new-cat-icon" value="📁">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script></script>
<script>
const STORAGE_KEY='sdg_v3';
const d=new Date();TODAY=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const SUPABASE_URL='https://bzlucslrylejrjachotw.supabase.co';const SUPABASE_KEY='sb_publishable_TiIhdz1pcjN-WBUspVn4yg_mZVU_DR5';let sb=null;try{sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)}catch(e){}function syncFromCloud(){if(!sb)return;sb.from('user_data').select('data').eq('id',1).single().then(({data:row,error})=>{if(error||!row||!row.data)return;const cd=row.data;if(!cd.points&&cd.points!==0)return;if(cd.points>DATA.points||Object.keys(cd.signIns||{}).length>Object.keys(DATA.signIns||{}).length){DATA=cd;saveData();refreshAll();showToast('☁️ 已从云端同步数据')}}).catch(()=>{})}
+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const DEFAULT_CATS=[
  {id:'cat_body',name:'身体',icon:'💪',color:'#4ade80'},
  {id:'cat_study',name:'学习',icon:'📚',color:'#a78bfa'},
  {id:'cat_work',name:'工作',icon:'💼',color:'#f59e0b'}
];
const ACHIEVEMENTS=[
  {id:'a7',icon:'🔥',name:'7天连签',cond:()=>getStreak()>=7},
  {id:'a30',icon:'💎',name:'30天连签',cond:()=>getStreak()>=30},
  {id:'a100',icon:'👑',name:'百日连签',cond:()=>getStreak()>=100},
  {id:'p500',icon:'⭐',name:'500 XP',cond:()=>DATA.points>=500},
  {id:'p2k',icon:'🌟',name:'2000 XP',cond:()=>DATA.points>=2000},
  {id:'p10k',icon:'✨',name:'10000 XP',cond:()=>DATA.points>=10000},
  {id:'l5',icon:'⚔️',name:'Lv.5',cond:()=>getLevel()>=5},
  {id:'l10',icon:'🛡️',name:'Lv.10',cond:()=>getLevel()>=10},
  {id:'t50',icon:'📝',name:'50次完成',cond:()=>totalTaskCompletions()>=50},
  {id:'t200',icon:'🏅',name:'200次完成',cond:()=>totalTaskCompletions()>=200},
  {id:'g1',icon:'🎯',name:'首个阶段',cond:()=>DATA.goals.some(g=>g.phases.some(p=>p.completed))}
];

let emojiPickerTarget=null;
const EMOJI_CATS=[{id:'face',label:'表情',icons:['😊','😎','🤩','🥳','😤','😭','🤔','👍','👎','🙏','💪','🧠','👀','🔥','⭐','✨','💎','🎉','❤️','💔','🤗','😴','🤯','🫡','🥺','😇','🫶']},{id:'work',label:'工作',icons:['💼','📊','📈','📉','📋','📝','✏️','🖊️','🗂️','📁','📌','🔖','⏰','⌚','📅','🗓️','✅','☑️','📎','🔗','📤','📥']},{id:'study',label:'学习',icons:['📚','📖','✍️','🎓','🏫','📐','🔬','🔭','💡','🧩','🎯','🏆','🥇','🥈','🥉','📜','🖥️','⌨️','🖱️','🧮']},{id:'health',label:'健康',icons:['💪','🏃','🏋️','🧘','🚴','🏊','🤸','🍎','🥗','💤','❤️‍🔥','🫁','🧘‍♀️','🤾','⛹️','🚶','🧗','⚽','🏀']},{id:'entertain',label:'娱乐',icons:['🎮','🎵','🎸','🎹','🎨','🎭','🎬','📺','🎧','🎤','🎲','♟️','🕹️','🎯','🎳','🎱','🃏','🎻','🥁']},{id:'life',label:'生活',icons:['🏠','🛏️','🧹','🧺','🍳','👨‍🍳','🌱','🪴','🐱','🐶','☕','🍵','🍜','🛒','🧳','✈️','🚗','🚲','🌍','🧭']},{id:'money',label:'理财',icons:['💰','💵','💸','🏦','📊','💳','🪙','💹','🏷️','🧾','📈','💎','🤑','💲','🛒']},{id:'social',label:'社交',icons:['🌐','💬','📱','📞','✉️','📧','🤝','🫂','👥','🗣️','💭','📢','🔔','📣','👋','🫱']},{id:'nature',label:'自然',icons:['🌿','🌸','🌙','☀️','⭐','🌈','❄️','🔥','💧','🌊','🌲','🍀','🌻','🪐','⚡','☁️','⛅','🌧️']}];
function openEmojiPicker(inputId){emojiPickerTarget=inputId;const input=document.getElementById(inputId);const hdr=document.getElementById('emoji-picker-header');hdr.innerHTML=EMOJI_CATS.map((c,i)=>'<button class="emoji-picker-cat'+(i===0?' active':'')+'" onclick="switchEmojiCat(event,\''+c.id+'\')">'+c.label+'</button>').join('');document.getElementById('emoji-picker-grid').innerHTML=EMOJI_CATS[0].icons.map(e=>'<div class="emoji-picker-item" onclick="selectEmoji(\''+e+'\')">'+e+'</div>').join('');document.getElementById('emoji-picker-overlay').classList.add('show')}
function switchEmojiCat(event,catId){event.stopPropagation();document.querySelectorAll('.emoji-picker-cat').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');const cat=EMOJI_CATS.find(c=>c.id===catId);if(cat)document.getElementById('emoji-picker-grid').innerHTML=cat.icons.map(e=>'<div class="emoji-picker-item" onclick="selectEmoji(\''+e+'\")">'+e+'</div>').join('')}
function selectEmoji(emoji){if(emojiPickerTarget){const input=document.getElementById(emojiPickerTarget);if(input){input.value=emoji;input.dispatchEvent(new Event('input'));const btn=document.getElementById(emojiPickerTarget+'-btn');if(btn)btn.textContent=emoji}}closeEmojiPicker()}
function closeEmojiPicker(event){if(event){const overlay=document.getElementById('emoji-picker-overlay');const picker=document.getElementById('emoji-picker');if(!overlay)return;let el=event.target;while(el){if(el===overlay&&(el===event.target||!picker||!picker.contains(event.target)))break;el=el.parentElement}if(!el)return}document.getElementById('emoji-picker-overlay').classList.remove('show');emojiPickerTarget=null}
function getDefaultData(){return{signIns:{},points:0,tasks:[],goals:[],categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),earnedAchievements:[],skillRoots:[]}}
function loadData(){try{let d=JSON.parse(localStorage.getItem(STORAGE_KEY));if(!d)d=getDefaultData();const def=getDefaultData();for(const k of Object.keys(def))if(!(k in d))d[k]=def[k];if(!d.categories||d.categories.length===0)d.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));return d}catch(e){return getDefaultData()}}
let _st=null;function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(DATA));if(sb&&(DATA.tasks.length>0||Object.keys(DATA.signIns).length>0||DATA.points>0)){clearTimeout(_st);_st=setTimeout(()=>{sb.from('user_data').upsert({id:1,data:DATA,updated_at:new Date().toISOString()}).then(({error})=>{if(!error)console.log('☁️ Synced')})},800)}}
let calendarYear=null,calendarMonth=null;let batchMode=false;let batchSelected=new Set();let DATA=loadData();let currentTab='today';
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function getLevel(){let lv=1;while(DATA.points>=xpFor(lv+1))lv++;return lv}
function xpFor(lv){return Math.floor(100*Math.pow(lv,1.6))}
function getXpProgress(){const lv=getLevel();const cur=DATA.points-xpFor(lv);const need=xpFor(lv+1)-xpFor(lv);return{level:lv,current:cur,needed:need,pct:need>0?Math.min(100,Math.floor(cur/need*100)):100}}
function getStreak(){let s=0;const d=new Date();if(DATA.signIns[TODAY]){while(DATA.signIns[d.toISOString().split('T')[0]]){s++;d.setDate(d.getDate()-1)}}else{d.setDate(d.getDate()-1);while(DATA.signIns[d.toISOString().split('T')[0]]){s++;d.setDate(d.getDate()-1)}}return s}
function totalTaskCompletions(){return DATA.tasks.reduce((sum,t)=>sum+Object.keys(t.completedDates||{}).length,0)}
function totalSignIns(){return Object.keys(DATA.signIns).length}

function doCheckIn(){if(DATA.signIns[TODAY])return;DATA.signIns[TODAY]=true;const s=getStreak();let bonus=5;if(s>=7&&s<30)bonus=15;else if(s>=30&&s<100)bonus=30;else if(s>=100)bonus=60;if(s===7)bonus+=50;if(s===30)bonus+=150;if(s===100)bonus+=500;DATA.points+=bonus;saveData();refreshAll();showToast('✨ 签到成功','连签 '+s+' 天，+'+bonus+' XP');checkAchievements();if(typeof gsap!=='undefined'){const btn=document.getElementById('signin-btn');const streakEl=document.getElementById('streak-num');const ptsEl=document.getElementById('pts-num');if(btn)gsap.fromTo(btn,{scale:1.2},{scale:1,duration:.5,ease:'elastic.out(1,0.4)'});if(streakEl){gsap.fromTo(streakEl,{scale:1.4,color:'#fbbf24'},{scale:1,color:null,duration:.6,ease:'power2.out'})}if(ptsEl)gsap.fromTo(ptsEl,{scale:1.4,color:'#5ce0b8'},{scale:1,color:null,duration:.6,ease:'power2.out'})}}
function isTaskDueToday(task){if(task.parentGoalId&&task.parentPhaseId){const goal=DATA.goals.find(g=>g.id===task.parentGoalId);if(!goal)return false;const phase=goal.phases.find(p=>p.id===task.parentPhaseId);if(!phase||phase.completed)return false;if(phase.startDate&&phase.startDate>TODAY)return false;if(phase.endDate&&phase.endDate<TODAY)return false}if(task.cycle==='daily')return true;if(task.cycle==='weekly')return true;if(task.cycle==='custom'){const created=new Date(task.createdAt||'2026-01-01');const diff=Math.floor((new Date(TODAY)-created)/86400000);return diff>=0&&diff%task.intervalDays===0}if(task.cycle==='deadline'){return task.deadlineDate&&task.deadlineDate>=TODAY&&!task.completedDates[TODAY]}return true}
function toggleTask(taskId){const task=DATA.tasks.find(t=>t.id===taskId);if(!task||task.type==='monitor')return;if(task.completedToday){task.completedToday=false;if(task.completedDates)delete task.completedDates[TODAY];DATA.points-=task.reward;if(task.type==='flexible')task.consecutiveMisses=(task.consecutiveMisses||0)+1}else{task.completedToday=true;if(!task.completedDates)task.completedDates={};task.completedDates[TODAY]=true;let pts=task.reward;DATA.points+=pts;if(task.type==='flexible')task.consecutiveMisses=0;showToast('✅ 任务完成',task.name+' +'+pts+' XP')}saveData();refreshAll();checkAchievements();if(typeof gsap!=='undefined'){const row=document.querySelector('[data-task-id="'+taskId+'"]');if(row&&task.completedToday){gsap.fromTo(row,{backgroundColor:'rgba(16,185,129,.2)',scale:1.03},{backgroundColor:'transparent',scale:1,duration:.6,ease:'power2.out'})}}}
function isTaskDueTodayOnDate(task,dateStr){if(task.cycle==='daily')return true;if(task.cycle==='weekly')return true;if(task.cycle==='custom'){const created=new Date(task.createdAt||'2026-01-01');const diff=Math.floor((new Date(dateStr)-created)/86400000);return diff>=0&&diff%task.intervalDays===0}return false}
function applyPenalties(){const todayTasks=DATA.tasks.filter(t=>isTaskDueToday(t)&&t.type!=='monitor');for(const task of DATA.tasks.filter(t=>t.type==='habit'&&isTaskDueToday(t))){if(task.lastPenaltyCheck===TODAY)continue;task.lastPenaltyCheck=TODAY;if(!task.penaltyRules)task.penaltyRules={reviewPeriod:7,completionThreshold:60,pointPenalty:50,realPenalty:''};const pr=task.penaltyRules;if(!pr.reviewPeriod||!pr.completionThreshold)continue;const end=new Date(TODAY);const start=new Date(TODAY);start.setDate(start.getDate()-pr.reviewPeriod);let due=0,done=0;for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){const ds=d.toISOString().split('T')[0];if(isTaskDueTodayOnDate(task,ds)){due++;if(task.completedDates[ds])done++}}if(due>0){const rate=Math.floor(done/due*100);if(rate<pr.completionThreshold){let penalty=pr.pointPenalty||50;DATA.points-=penalty;saveData();let msg='⚠️ '+task.name+' 近'+pr.reviewPeriod+'天完成率'+rate+'%，低于'+pr.completionThreshold+'%，扣'+penalty+' XP';if(pr.realPenalty)msg+='\n现实惩罚：'+pr.realPenalty;showToast('📉 惩罚触发',msg)}}}for(const task of DATA.tasks.filter(t=>t.type==='flexible'&&isTaskDueToday(t))){if(task.lastPenaltyCheck===TODAY)continue;task.lastPenaltyCheck=TODAY;if(!task.flexibleRules)task.flexibleRules={popPeriod:'weekly',popCount:3,completionThreshold:60,pointPenalty:100,realPenalty:''};const fr=task.flexibleRules;if(!fr.popPeriod||!fr.popCount)continue;const end=new Date(TODAY);let start=new Date(TODAY);if(fr.popPeriod==='weekly')start.setDate(start.getDate()-7);else if(fr.popPeriod==='monthly')start.setMonth(start.getMonth()-1);else continue;let due=0,done=0;for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){const ds=d.toISOString().split('T')[0];if(isTaskDueTodayOnDate(task,ds)){due++;if(task.completedDates[ds])done++}}if(due>=fr.popCount){const rate=Math.floor(done/due*100);if(rate<fr.completionThreshold){DATA.points-=fr.pointPenalty||100;saveData();let msg='⚠️ '+task.name+' 本周期完成率'+rate+'%，低于'+fr.completionThreshold+'%，扣'+fr.pointPenalty+' XP';if(fr.realPenalty)msg+='\n现实惩罚：'+fr.realPenalty;showToast('📉 弹性任务惩罚',msg)}}}for(const task of DATA.tasks.filter(t=>t.type==='habit'&&t.category==='negative'&&isTaskDueToday(t)&&!t.completedToday)){if(task.lastNegativePenalty===TODAY)continue;task.lastNegativePenalty=TODAY;let penalty=task.penalty||50;DATA.points-=penalty;saveData();showToast('🚫 未守住',task.name+' 扣'+penalty+' XP')}}

function findSkillNode(id,nodes){if(!nodes)nodes=DATA.skillRoots||[];for(const n of nodes){if(n.id===id)return n;const found=findSkillNode(id,n.children||[]);if(found)return found}return null}
function findParentNode(id,nodes){if(!nodes)nodes=DATA.skillRoots||[];for(const n of nodes){if((n.children||[]).some(c=>c.id===id))return n;const found=findParentNode(id,n.children||[]);if(found)return found}return null}
function openSkillNodeModal(parentId){const modal=document.getElementById('modal-content');const title=parentId?'➕ 添加分支技能':'🌱 种下根技能';modal.innerHTML='<h2>'+title+'</h2><form onsubmit="submitSkillNode(event,\''+(parentId||'')+'\')"><div class="form-g"><label>技能名称 *</label><input type="text" id="sn-name" required placeholder="例如：学会吉他"></div><div class="skill-node-modal-row"><div class="form-g"><label>图标</label><div class="emoji-input-wrap"><input type="text" id="sn-icon" value="🌱" readonly maxlength="2" style="width:56px;text-align:center;font-size:18px;cursor:pointer" onclick="openEmojiPicker(&apos;sn-icon&apos;)"><button type="button" class="emoji-icon-trigger" onclick="openEmojiPicker(&apos;sn-icon&apos;)" title="选择图标">🎨</button></div></div></div>'+(parentId?'':'<div class="form-g"><label>来源说明（可选）</label><input type="text" id="sn-source" placeholder="例如：来自长期目标「健身计划」"></div>')+'<div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">确定</button></div></form>';document.getElementById('modal-overlay').classList.add('show')}

function convertPhaseToSkill(goalId,phaseId){const goal=DATA.goals.find(g=>g.id===goalId);if(!goal)return;const phase=goal.phases.find(p=>p.id===phaseId);if(!phase||!phase.completed)return;if(!confirm('将阶段「'+phase.name+'」转化为技能节点吗？'))return;DATA.skillRoots.push({id:uid(),name:phase.name,icon:phase.reward?'🎯':'⭐',source:'来自长期目标「'+goal.name+'」',mastered:true,children:[],createdAt:TODAY,goalId,phaseId});saveData();refreshAll();showToast('🌳 已种入技能树','「'+phase.name+'」已添加为根技能')}
function toggleSkillMastered(id){const node=findSkillNode(id);if(!node)return;node.mastered=!node.mastered;saveData();refreshAll()}
function deleteSkillNode(id){const node=findSkillNode(id);if(!node)return;const hasChildren=(node.children||[]).length>0;const msg=hasChildren?'确定删除「'+node.name+'」及其所有分支吗？':'确定删除「'+node.name+'」吗？';if(!confirm(msg))return;const parent=findParentNode(id);if(parent)parent.children=(parent.children||[]).filter(c=>c.id!==id);else DATA.skillRoots=(DATA.skillRoots||[]).filter(n=>n.id!==id);saveData();refreshAll()}

// ===== Skill Tree Force-Directed Graph =====
let skillGNodes=[],skillGEdges=[],skillCanvas=null,skillCtx=null,skillAnim=null,skillDragNode=null,skillHoverNode=null,skillScale=1,skillPinchDist=0,skillPinchMX=0,skillPinchMY=0;
function flattenSkillNodes(nodes,parentId,depth){
  const r={nodes:[],edges:[]};
  for(const n of nodes){
    r.nodes.push({id:n.id,name:n.name,icon:n.icon,mastered:n.mastered,source:n.source||'',depth,x:Math.random()*300+100,y:Math.random()*250+80,vx:0,vy:0,radius:depth===0?30:24});
    r.edges.push({from:parentId,to:n.id});
    const child=flattenSkillNodes(n.children||[],n.id,depth+1);
    r.nodes.push(...child.nodes);r.edges.push(...child.edges);
  }
  return r;
}
function initSkillGraph(){
  const container=document.getElementById('skill-tree-container');
  if(!container)return;
  container.innerHTML='';
  const canvas=document.createElement('canvas');
  canvas.style.width='100%';canvas.style.height='100%';canvas.style.position='absolute';canvas.style.top='0';canvas.style.left='0';
  skillCanvas=canvas;skillCtx=canvas.getContext('2d');
  container.appendChild(canvas);
  const rect=container.getBoundingClientRect();
  const w=Math.max(300,rect.width||300);
  skillCanvas.width=w*2;skillCanvas.height=460*2;
  skillCanvas.style.width=w+'px';skillCanvas.style.height='460px';
  const flat=flattenSkillNodes(DATA.skillRoots||[],null,0);
  skillGNodes=flat.nodes;skillGEdges=flat.edges;
  if(skillGNodes.length===0){container.innerHTML='<div class="empty-state"><div class="icon">🌱</div>还没有技能，点击下方按钮种下第一个根技能</div>';skillCanvas=null;return}
  const cx=w,cY=460;
  const roots=skillGNodes.filter(n=>n.depth===0);
  roots.forEach((n,i)=>{const a=2*Math.PI*i/Math.max(1,roots.length);n.x=cx+Math.cos(a)*70;n.y=cY+Math.sin(a)*70});
  startSkillSim();setupSkillCanvasEvents();
}
function startSkillSim(){
  let iter=0;
  function tick(){
    if(!skillCanvas){skillAnim=null;return}
    const w=skillCanvas.width,h=skillCanvas.height;
    for(let i=0;i<skillGNodes.length;i++){
      const a=skillGNodes[i];
      let fx=0,fy=0;
      for(let j=0;j<skillGNodes.length;j++){
        if(i===j)continue;
        const b=skillGNodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.max(5,Math.sqrt(dx*dx+dy*dy)),f=2400/(d*d);
        fx+=(dx/d)*f;fy+=(dy/d)*f;
      }
      fx+=(w/2-a.x)*0.002;fy+=(h/2-a.y)*0.002;
      skillGEdges.filter(e=>e.from===a.id||e.to===a.id).forEach(e=>{
        const oId=e.from===a.id?e.to:e.from;
        const b=skillGNodes.find(n=>n.id===oId);
        if(b){const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy),ideal=100+a.depth*70;fx+=(dx/d)*(d-ideal)*0.008;fy+=(dy/d)*(d-ideal)*0.008}
      });
      a.vx=(a.vx+fx)*0.82;a.vy=(a.vy+fy)*0.82;
      a.x+=a.vx;a.y+=a.vy;
      const pad=a.radius+8;a.x=Math.max(pad,Math.min(w-pad,a.x));a.y=Math.max(pad,Math.min(h-pad,a.y));
    }
    iter++;
    drawSkillGraph();
    if(iter<100||skillDragNode){skillAnim=requestAnimationFrame(tick)}else{skillAnim=null;drawSkillGraph()}
    if(iter>400){skillAnim=null;drawSkillGraph()}
  }
  skillAnim=requestAnimationFrame(tick);
}
function drawSkillGraph(){
  if(!skillCtx||!skillCanvas)return;
  const ctx=skillCtx,w=skillCanvas.width,h=skillCanvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.save();ctx.translate(w/2,h/2);ctx.scale(skillScale,skillScale);ctx.translate(-w/2,-h/2);
  ctx.fillStyle='rgba(255,255,255,.01)';ctx.fillRect(0,0,w,h);
  // Edges
  skillGEdges.forEach(e=>{
    const a=skillGNodes.find(n=>n.id===e.from),b=skillGNodes.find(n=>n.id===e.to);
    if(!a||!b)return;
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2-20;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(mx,my,b.x,b.y);
    const hl=skillHoverNode&&(e.from===skillHoverNode.id||e.to===skillHoverNode.id);
    ctx.strokeStyle=hl?'rgba(92,224,184,.45)':'rgba(255,255,255,.06)';
    ctx.lineWidth=hl?1.8:0.8;ctx.stroke();
  });
  // Nodes
  skillGNodes.forEach(n=>{
    const isHover=skillHoverNode&&skillHoverNode.id===n.id;
    const isDrag=skillDragNode&&skillDragNode.id===n.id;
    const isConn=skillHoverNode&&!isHover&&skillGEdges.some(e=>(e.from===skillHoverNode.id&&e.to===n.id)||(e.to===skillHoverNode.id&&e.from===n.id));
    const r=n.radius+(isHover?4:0)+(isDrag?3:0);
    if(n.mastered){ctx.shadowColor='rgba(92,224,184,.5)';ctx.shadowBlur=16}
    else if(isHover||isDrag){ctx.shadowColor='rgba(124,92,252,.5)';ctx.shadowBlur=14}
    else if(isConn){ctx.shadowColor='rgba(92,224,184,.25)';ctx.shadowBlur=8}
    else{ctx.shadowColor='transparent';ctx.shadowBlur=0}
    const grad=ctx.createRadialGradient(n.x-r*.3,n.y-r*.3,0,n.x,n.y,r);
    if(n.mastered){grad.addColorStop(0,'#34d399');grad.addColorStop(1,'#0d4d33')}
    else if(isHover||isDrag){grad.addColorStop(0,'#9b7cfc');grad.addColorStop(1,'#3d1d8c')}
    else if(n.depth===0){grad.addColorStop(0,'#7c5cfc');grad.addColorStop(1,'#1d1060')}
    else{grad.addColorStop(0,'#5a5a9a');grad.addColorStop(1,'#1a1a44')}
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
    ctx.shadowColor='transparent';ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.strokeStyle=n.mastered?'rgba(92,224,184,.6)':isHover?'rgba(124,92,252,.7)':isConn?'rgba(92,224,184,.3)':isDrag?'rgba(124,92,252,.7)':'rgba(255,255,255,.12)';
    ctx.lineWidth=isHover||isDrag?2.2:1.2;ctx.stroke();
    ctx.font=(r*0.8)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.icon,n.x,n.y);
    ctx.font='bold '+(isHover?11:10)+'px sans-serif';ctx.fillStyle=isHover?'#fff':'rgba(255,255,255,.7)';ctx.fillText(n.name,n.x,n.y+r+12);
    if(n.mastered){ctx.font='9px sans-serif';ctx.fillStyle='#5ce0b8';ctx.fillText('✔',n.x+r-8,n.y-r+8)}
  });
  ctx.restore();}
function setupSkillCanvasEvents(){
  if(!skillCanvas)return;
  skillCanvas.onmousedown=function(e){
    const rect=skillCanvas.getBoundingClientRect();
    const sx=skillCanvas.width/rect.width,sy=skillCanvas.height/rect.height;
    const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
    for(let i=skillGNodes.length-1;i>=0;i--){
      const n=skillGNodes[i],dx=mx-n.x,dy=my-n.y;
      if(dx*dx+dy*dy<(n.radius+8)*(n.radius+8)){skillDragNode=n;skillHoverNode=n;if(skillAnim===null)startSkillSim();drawSkillGraph();return}
    }
    skillDragNode=null;skillHoverNode=null;drawSkillGraph();
  };
  skillCanvas.onmousemove=function(e){
    const rect=skillCanvas.getBoundingClientRect();
    const sx=skillCanvas.width/rect.width,sy=skillCanvas.height/rect.height;
    const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
    if(skillDragNode){skillDragNode.x=mx;skillDragNode.y=my;skillDragNode.vx=0;skillDragNode.vy=0;drawSkillGraph();return}
    skillHoverNode=null;
    for(let i=skillGNodes.length-1;i>=0;i--){const n=skillGNodes[i],dx=mx-n.x,dy=my-n.y;if(dx*dx+dy*dy<(n.radius+8)*(n.radius+8)){skillHoverNode=n;break}}
    skillCanvas.style.cursor=skillHoverNode?'pointer':'grab';drawSkillGraph();
  };
  skillCanvas.onmouseup=function(){if(skillDragNode){skillDragNode=null;drawSkillGraph()}};
  skillCanvas.onmouseleave=function(){skillDragNode=null;skillHoverNode=null;skillCanvas.style.cursor='default';drawSkillGraph()};
  let skillTouchMoved=false,skillTouchStartTime=0,skillTouchStartX=0,skillTouchStartY=0;
  skillCanvas.ontouchstart=function(e){
    if(e.touches.length===2){skillPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);skillPinchMX=(e.touches[0].clientX+e.touches[1].clientX)/2;skillPinchMY=(e.touches[0].clientY+e.touches[1].clientY)/2;return}
    if(e.touches.length!==1)return;
    skillTouchMoved=false;skillTouchStartTime=Date.now();
    const rect=skillCanvas.getBoundingClientRect();
    const sx=skillCanvas.width/rect.width,sy=skillCanvas.height/rect.height;
    const mx=(e.touches[0].clientX-rect.left)*sx,my=(e.touches[0].clientY-rect.top)*sy;
    skillTouchStartX=mx;skillTouchStartY=my;
    skillHoverNode=null;skillDragNode=null;
    for(let i=skillGNodes.length-1;i>=0;i--){
      const n=skillGNodes[i],dx=mx-n.x,dy=my-n.y;
      if(dx*dx+dy*dy<(n.radius+18)*(n.radius+18)){skillHoverNode=n;drawSkillGraph();return}
    }
    drawSkillGraph();
  };
  skillCanvas.ontouchmove=function(e){
    if(e.touches.length===2&&skillPinchDist>0){e.preventDefault();const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);skillScale=Math.max(.3,Math.min(3,skillScale*nd/skillPinchDist));skillPinchDist=nd;drawSkillGraph();return}
    if(!skillHoverNode)return;
    if(e.touches.length!==1)return;
    const rect=skillCanvas.getBoundingClientRect();
    const sx=skillCanvas.width/rect.width,sy=skillCanvas.height/rect.height;
    const mx=(e.touches[0].clientX-rect.left)*sx,my=(e.touches[0].clientY-rect.top)*sy;
    const dx=mx-skillTouchStartX,dy=my-skillTouchStartY;
    if(Math.abs(dx)>5||Math.abs(dy)>5){skillTouchMoved=true;skillDragNode=skillHoverNode}
    if(skillDragNode){e.preventDefault();skillDragNode.x=mx;skillDragNode.y=my;skillDragNode.vx=0;skillDragNode.vy=0;drawSkillGraph()}
  };
  skillCanvas.ontouchend=function(){
    if(skillDragNode){skillDragNode=null;drawSkillGraph();return}
    const dt=Date.now()-skillTouchStartTime;
    if(skillHoverNode&&!skillTouchMoved&&dt<500){showSkillActionBar(skillHoverNode)}
    else{hideSkillActionBar()}
    skillDragNode=null;drawSkillGraph();
  };
  skillCanvas.onclick=function(e){
    if(skillHoverNode){
      e.stopPropagation();
      showSkillActionBar(skillHoverNode);
    }else{
      hideSkillActionBar();
    }
  };
  window.addEventListener('resize',function(){
    if(!skillCanvas)return;const container=document.getElementById('skill-tree-container');if(!container)return;
    const rect=container.getBoundingClientRect(),w=Math.max(300,rect.width||300);
    skillCanvas.width=w*2;skillCanvas.height=460*2;skillCanvas.style.width=w+'px';skillCanvas.style.height='460px';drawSkillGraph();
  });
}

let skillActionBarNode=null;
function showSkillActionBar(node){
  skillActionBarNode=node;
  const bar=document.getElementById('skill-action-bar');
  if(!bar)return;
  document.getElementById('skill-action-name').textContent=node.icon+' '+node.name;
  document.getElementById('skill-action-master').textContent=node.mastered?'🔄 取消掌握':'✔ 标记掌握';
  bar.classList.add('show');
}
function hideSkillActionBar(){
  const bar=document.getElementById('skill-action-bar');
  if(bar)bar.classList.remove('show');
  skillActionBarNode=null;
}
function doSkillAction(action){
  if(!skillActionBarNode)return;
  const node=skillActionBarNode;
  if(action==='add')openSkillNodeModal(node.id);
  else if(action==='master')toggleSkillMastered(node.id);
  else if(action==='delete')deleteSkillNode(node.id);
  hideSkillActionBar();
}
function resetSkillGraph(){initSkillGraph()}
function refreshSkillTree(){
  const container=document.getElementById('skill-tree-container');
  if(!container)return;
  if(!DATA.skillRoots||DATA.skillRoots.length===0){
    container.innerHTML='<div class="empty-state"><div class="icon">🌱</div>还没有技能，点击下方按钮种下第一个根技能</div>';
    skillCanvas=null;skillCtx=null;if(skillAnim){cancelAnimationFrame(skillAnim);skillAnim=null}
    return;
  }
  if(skillAnim){cancelAnimationFrame(skillAnim);skillAnim=null}

function refreshCalendar(){
  const container=document.getElementById('calendar-heatmap');
  const now=new Date();
  if(calendarYear===null||calendarYear===undefined){calendarYear=now.getFullYear();calendarMonth=now.getMonth()}
  const year=calendarYear,month=calendarMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthLabel=year+'年'+(month+1)+'月';
  const isCurrentMonth=year===now.getFullYear()&&month===now.getMonth();
  
  // Header with navigation
  let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:12px;">';
  html+='<button class="cal-nav-btn" onclick="navigateMonth(-1)" title="上月">◀</button>';
  html+='<span style="font-weight:700;font-size:13px;">'+monthLabel+'</span>';
  html+='<button class="cal-nav-btn" onclick="navigateMonth(1)" title="下月"'+(isCurrentMonth?' disabled style="opacity:.3;cursor:default"':'')+'>▶</button>';
  html+='</div>';
  
  html+='<div class="cal-heat">';
  ['日','一','二','三','四','五','六'].forEach(h=>html+='<div class="cal-cell header">'+h+'</div>');
  for(let i=0;i<firstDay;i++)html+='<div class="cal-cell empty"></div>';
  
  for(let d=1;d<=daysInMonth;d++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===TODAY;
    let due=0,done=0,dayXP=0;
    for(const t of DATA.tasks){
      if(t.type==='monitor')continue;
      if(isTaskDueTodayOnDate(t,ds)){
        due++;
        if(t.completedDates[ds]){done++;dayXP+=t.reward||0}
      }
      // Count negative XP from habit tasks that failed on this day
      if(t.type==='habit'&&t.lastPenaltyCheck===ds&&t.penaltyRules&&t.penaltyRules.pointPenalty){
        // We approximate: if a penalty was applied on this day
        if(!t.completedDates[ds]&&isTaskDueTodayOnDate(t,ds))dayXP-=(t.penaltyRules.pointPenalty||0);
      }
    }
    let pctLevel=0;
    if(due>0){const r=done/due;if(r>=1)pctLevel=5;else if(r>=0.75)pctLevel=4;else if(r>=0.5)pctLevel=3;else if(r>=0.25)pctLevel=2;else pctLevel=1}
    if(DATA.signIns[ds]&&pctLevel===0)pctLevel=1;
    
    // Progress bar height
    const barH=due>0?Math.round(done/due*100):0;
    const barColor=barH>=100?'var(--primary2)':barH>=50?'var(--success)':barH>0?'var(--warning)':'transparent';
    
    // XP display
    let xpStr='';
    if(dayXP>0)xpStr='<span style="font-size:7px;line-height:1;color:var(--danger)">+'+dayXP+'</span>';
    else if(dayXP<0)xpStr='<span style="font-size:7px;line-height:1;color:var(--success)">'+dayXP+'</span>';
    
    let cls='cal-cell';
    if(isToday)cls+=' today';
    html+='<div class="'+cls+'" data-pct="'+pctLevel+'" title="'+ds+': '+done+'/'+due+' XP:'+(dayXP||0)+'">';
    html+='<div class="cal-bar" style="height:'+barH+'%;background:'+barColor+'"></div>';
    html+='<div class="cal-content"><span class="cal-day">'+d+'</span>'+xpStr+'</div>';
    html+='</div>';
  }
  html+='</div>';
  container.innerHTML=html;
}

function getWeekBounds(){
  const now=new Date();const day=now.getDay();const monday=new Date(now);monday.setDate(now.getDate()-(day===0?6:day-1));
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  return{monday:monday,sunday:sunday}
}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function computePeriodStats(startDate,endDate){
  let due=0,done=0,xp=0,daysWithTasks=0,daysAllDone=0;
  const catDone={},catDue={},taskCount={};
  const catMap={};for(const cat of DATA.categories||[])catMap[cat.id]=cat.name;
  const d=new Date(startDate);
  while(d<=endDate){
    const ds=fmt(d);let dayDue=0,dayDone=0;
    for(const t of DATA.tasks){
      if(t.type==='monitor')continue;
      if(isTaskDueTodayOnDate(t,ds)){
        // Get category label
        if(t.categoryId)catDue[t.categoryId]=(catDue[t.categoryId]||0)+1;
        due++;dayDue++;
        if(t.completedDates[ds]){
          if(t.categoryId)catDone[t.categoryId]=(catDone[t.categoryId]||0)+1;
          done++;dayDone++;
          xp+=t.reward||0;
          taskCount[t.name]=(taskCount[t.name]||0)+1;
        }
      }
    }
    if(dayDue>0){daysWithTasks++;if(dayDone===dayDue)daysAllDone++}
    d.setDate(d.getDate()+1);
  }
  const rate=due>0?Math.round(done/due*100):0;
  const perfDays=due>0?Math.round(daysAllDone/daysWithTasks*100):0;
  // Top category
  let topCat='',topCatRate=0;
  for(const cid in catDue){
    const cr=catDue[cid]>0?Math.round((catDone[cid]||0)/catDue[cid]*100):0;
    if(cr>topCatRate){topCatRate=cr;topCat=catMap[cid]||cid}
  }
  // Most completed task
  let topTask='',topTaskCount=0;
  for(const name in taskCount){if(taskCount[name]>topTaskCount){topTaskCount=taskCount[name];topTask=name}}
  return{due,done,rate,xp,perfDays,topCat,topCatRate,topTask,topTaskCount,daysWithTasks,daysAllDone}
}
function computeWeekStats(){
  const{monday,sunday}=getWeekBounds();
  return computePeriodStats(monday,sunday);
}
function computeMonthStats(year,month){
  if(year===undefined||month===undefined){const now=new Date();year=now.getFullYear();month=now.getMonth()}
  const start=new Date(year,month,1);
  const end=new Date(year,month+1,0);
  return computePeriodStats(start,end);
}

de?'<input type="checkbox" data-id="'+t.id+'" '+(batchSelected.has(t.id)?'checked':'')+' onchange="toggleBatchSelect(\''+t.id+'\')" style="margin-right:8px;accent-color:var(--primary)">':'')+'<span class="task-type-tag t2">②</span><div class="sr-info"><div class="sr-name">'+escHtml(t.name)+'</div><div class="sr-meta">奖+'+t.reward+' · '+fr.popPeriod+'/'+fr.popCount+'次 · 阈值'+fr.completionThreshold+'% · 罚-'+fr.pointPenalty+'</div></div><button class="btn btn-outline btn-xs" onclick="editFlexRules(\''+t.id+'\')">📝 规则</button><button class="btn btn-danger btn-xs" onclick="deleteTask(\''+t.id+'\')">删除</button></div>'}).join('');const t3c=document.getElementById('settings-t3');if(DATA.goals.length===0)t3c.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px 0;">暂无长期目标</div>';else t3c.innerHTML=DATA.goals.map(g=>{const pp=getGoalProgress(g);return'<div class="setting-row">'+(batchMode?'<input type="checkbox" data-id="'+g.id+'" '+(batchSelected.has(g.id)?'checked':'')+' onchange="toggleBatchSelect(\''+g.id+'\')" style="margin-right:8px;accent-color:var(--primary)">':'')+'<span class="task-type-tag" style="background:#f59e0b33;color:#fbbf24;">③</span><div class="sr-info"><div class="sr-name">'+escHtml(g.name)+'</div><div class="sr-meta">'+pp.done+'/'+pp.total+' 阶段完成</div></div><button class="btn btn-outline btn-xs" onclick="openPhaseModal(\''+g.id+'\')">+ 阶段</button><button class="btn btn-danger btn-xs" onclick="deleteGoal(\''+g.id+'\')">删除</button></div>'}).join('');const t4c=document.getElementById('settings-t4');const t4=DATA.tasks.filter(t=>t.type==='monitor');if(t4.length===0)t4c.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px 0;">暂无监测项</div>';else t4c.innerHTML=t4.map(t=>'<div class="setting-row"><span class="task-type-tag" style="background:#f8717133;color:#fca5a5;">④</span><div class="sr-info"><div class="sr-name">'+escHtml(t.name)+'</div><div class="sr-meta">'+(t.subType==='reminder'?'🔔 更新提醒':'📊 数据总结')+'</div></div><button class=" function toggleBatchMode(){batchMode=!batchMode;batchSelected.clear();const btn=document.getElementById('batch-toggle-btn');const bar=document.getElementById('batch-bar');if(batchMode){btn.textContent='✕ 退出批量';btn.classList.add('active');if(bar)bar.style.display='flex'}else{btn.textContent='✅ 批量管理';btn.classList.remove('active');if(bar)bar.style.display='none'}refreshSettings()}
function toggleBatchSelect(id){if(batchSelected.has(id))batchSelected.delete(id);else batchSelected.add(id);document.getElementById('batch-count').textContent=batchSelected.size}
function batchSelectAll(){const rows=document.querySelectorAll('.setting-row input[type=checkbox]');const allChecked=batchSelected.size===rows.length;if(allChecked){batchSelected.clear();rows.forEach(cb=>cb.checked=false)}else{rows.forEach(cb=>{cb.checked=true;batchSelected.add(cb.dataset.id)})}document.getElementById('batch-count').textContent=batchSelected.size}
function batchDelete(){
  if(batchSelected.size===0)return;
  if(!confirm('确定删除选中的 '+batchSelected.size+' 项？此操作不可恢复。'))return;
  DATA.tasks=DATA.tasks.filter(t=>!batchSelected.has(t.id));
  DATA.goals=DATA.goals.filter(g=>!batchSelected.has(g.id));
  batchSelected.clear();batchMode=false;toggleBatchMode();
  saveData();refreshAll();showToast('🗑 已删除','共删除选中项')
}
function batchArchive(){
  if(batchSelected.size===0)return;
  if(!confirm('确定归档选中的 '+batchSelected.size+' 项？归档后不再出现在任务列表中。'))return;
  for(const t of DATA.tasks){if(batchSelected.has(t.id))t.archived=true}
  for(const g of DATA.goals){if(batchSelected.has(g.id))g.archived=true}
  batchSelected.clear();batchMode=false;toggleBatchMode();
  saveData();refreshAll();showToast('📦 已归档','可在归档中查看')
}

function deleteTask(id){const task=DATA.tasks.find(t=>t.id===id);if(!task)return;if(!task.deletable&&task.type==='habit'){showToast('🔒','此任务设定为不可删除');return}if(!confirm('确定删除任务「'+task.name+'」吗？'))return;DATA.tasks=DATA.tasks.filter(t=>t.id!==id);saveData();refreshAll()}
function deleteGoal(id){if(!confirm('确定删除此长期目标及其所有阶段吗？'))return;DATA.goals=DATA.goals.filter(g=>g.id!==id);DATA.tasks=DATA.tasks.filter(t=>t.parentGoalId!==id);saveData();refreshAll()}
function deletePhase(goalId,phaseId){if(!confirm('确定删除此阶段及其子任务吗？'))return;const goal=DATA.goals.find(g=>g.id===goalId);if(!goal)return;goal.phases=goal.phases.filter(p=>p.id!==phaseId);DATA.tasks=DATA.tasks.filter(t=>!(t.parentGoalId===goalId&&t.parentPhaseId===phaseId));saveData();refreshAll()}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show')}
function checkAchievements(){let n=false;for(const a of ACHIEVEMENTS){if(!DATA.earnedAchievements.includes(a.id)&&a.cond()){DATA.earnedAchievements.push(a.id);n=true;showToast('🏆 成就解锁',a.icon+' '+a.name)}}if(n)saveData()}
function requestNotifPerm(){if(!('Notification' in window))return;if(Notification.permission==='default')Notification.requestPermission()}
function checkReminders(){if(!('Notification' in window)||Notification.permission!=='granted')return;const now=new Date();const ct=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');for(const t of DATA.tasks){if(!t.reminderEnabled||!t.reminderTime||t.lastReminderDate===TODAY)continue;if(t.reminderTime===ct){if(t.type==='monitor'){new Notification('📡 监测提醒',{body:'该查看「'+t.name+'」了！'+(t.url?'\n'+t.url:'')})}else if(isTaskDueToday(t)&&!t.completedToday){new Notification('⏰ 自律提醒',{body:'该去做「'+t.name+'」了！'})}t.lastReminderDate=TODAY}}saveData()}
function escHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function escAttr(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showToast(t,m){const el=document.createElement('div');el.className='toast success';el.innerHTML='<div class="tt">'+t+'</div><div class="tm">'+m+'</div>';document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}
function init(){syncFromCloud();document.addEventListener("submit",function(e){e.preventDefault()});if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(()=>console.log('SW registered')).catch(()=>{})}document.querySelectorAll('.nav-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentTab=btn.dataset.tab;document.querySelectorAll('.tab-content').forEach(tc=>tc.classList.remove('active'));const tabEl=document.getElementById('tab-'+currentTab);if(tabEl)tabEl.classList.add('active');refreshAll()})});for(const t of DATA.tasks)t.completedToday=!!t.completedDates[TODAY];if(!DATA.categories||DATA.categories.length===0)DATA.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));refreshAll();checkAchievements();requestNotifPerm();setInterval(checkReminders,30000);applyPenalties()}
window.doCheckIn=doCheckIn;window.toggleTask=toggleTask;window.openTaskModal=openTaskModal;window.openGoalModal=openGoalModal;window.openPhaseModal=openPhaseModal;window.openMonitorModal=openMonitorModal;window.completePhase=completePhase;window.editPenalty=editPenalty;window.editFlexRules=editFlexRules;window.savePenalty=savePenalty;window.saveFlexRules=saveFlexRules;window.addCategory=addCategory;window.deleteCategory=deleteCategory;window.deleteTask=deleteTask;window.deleteGoal=deleteGoal;window.deletePhase=deletePhase;window.ackMonitor=ackMonitor;window.closeModal=closeModal;window.toggleCycleOpts=toggleCycleOpts;window.openSkillNodeModal=openSkillNodeModal;window.submitSkillNode=submitSkillNode;window.convertPhaseToSkill=convertPhaseToSkill;window.toggleSkillMastered=toggleSkillMastered;window.deleteSkillNode=deleteSkillNode;window.submitGoal=submitGoal;window.submitPhase=submitPhase;window.submitTask=submitTask;window.submitMonitor=submitMonitor;window.handleMonitorFile=handleMonitorFile;window.navigateMonth=navigateMonth;window.toggleBatchMode=toggleBatchMode;window.toggleBatchSelect=toggleBatchSelect;window.batchSelectAll=batchSelectAll;window.batchDelete=batchDelete;window.batchArchive=batchArchive;window.ackMonitorResult=ackMonitorResult;window.snoozeMonitor=snoozeMonitor;
function exportBackup(){const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="discipline-realm-backup-"+new Date().toISOString().split("T")[0]+".json";a.click();URL.revokeObjectURL(url);showToast("✅ 备份已下载")}
function importBackup(input){if(!input.files||!input.files[0])return;const reader=new FileReader();reader.onload=function(e){try{const data=JSON.parse(e.target.result);if(!data.tasks||!data.signIns||data.points===undefined){showToast("❌ 无效的备份文件");return}if(!confirm("⚠️ 恢复备份将覆盖当前数据，确定继续？"))return;DATA=data;saveData();refreshAll();showToast("✅ 数据已恢复")}catch(err){showToast("❌ 文件解析失败")}};reader.readAsText(input.files[0]);input.value=""}
window.openEmojiPicker=openEmojiPicker;window.switchEmojiCat=switchEmojiCat;window.selectEmoji=selectEmoji;window.closeEmojiPicker=closeEmojiPicker;window.showSkillActionBar=showSkillActionBar;window.hideSkillActionBar=hideSkillActionBar;window.doSkillAction=doSkillAction;window.exportBackup=exportBackup;window.importBackup=importBackup;

init()
</script>
