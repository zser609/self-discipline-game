<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>自律大陆 · Discipline Realm</title>
<style>
:root{--bg:#0a0a14;--surface:#141428;--surface2:#1e1e38;--border:#2a2a4a;--text:#e0e0f0;--text2:#8888aa;--accent:#a78bfa;--accent2:#5ce0b8;--positive:#4ade80;--negative:#f87171;--warning:#fbbf24;--gold:#f59e0b;--xp-bar:#a78bfa;--radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,.5);--font:"Segoe UI",system-ui,-apple-system,sans-serif}*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px}.app{width:100%;max-width:860px;display:flex;flex-direction:column;gap:14px}.topbar{display:flex;align-items:center;gap:18px;background:var(--surface);border-radius:var(--radius);padding:12px 18px;border:1px solid var(--border);flex-wrap:wrap}.topbar .mini{font-size:13px;color:var(--text2)}.topbar .val{font-weight:700;font-size:15px}.topbar .gold{color:var(--gold)}.topbar .cyan{color:var(--accent2)}.topbar .purple{color:var(--accent)}.topbar .sep{width:1px;height:20px;background:var(--border)}.topbar .signin-btn{margin-left:auto;padding:6px 18px;font-size:13px;border-radius:20px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;font-weight:600;transition:all .2s}.topbar .signin-btn:hover{background:var(--gold);color:#000}.topbar .signin-btn.done{border-color:var(--positive);color:var(--positive);background:transparent;cursor:default}.nav{display:flex;gap:3px;background:var(--surface);border-radius:var(--radius);padding:3px;border:1px solid var(--border)}.nav-btn{flex:1;padding:10px 6px;border:none;background:transparent;color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}.nav-btn:hover{color:var(--text);background:var(--surface2)}.nav-btn.active{background:var(--accent);color:#fff;box-shadow:0 0 12px rgba(167,139,250,.4)}.card{background:var(--surface);border-radius:var(--radius);padding:18px;border:1px solid var(--border);margin-bottom:12px}.card h2{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px}.tab-content{display:none}.tab-content.active{display:block}
.cat-module{border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}.cat-module .cat-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;font-weight:700;font-size:14px;transition:background .2s}.cat-module .cat-header:hover{filter:brightness(1.1)}.cat-module .cat-header .arrow{transition:transform .2s;font-size:11px;margin-left:auto}.cat-module.collapsed .cat-body{display:none}.cat-module.collapsed .cat-header .arrow{transform:rotate(-90deg)}.cat-module .cat-body{padding:6px 0}.cat-module .cat-progress{font-size:11px;margin-left:auto;margin-right:8px;opacity:.8}.task-row{display:flex;align-items:center;gap:10px;padding:8px 14px;transition:background .15s}.task-row:hover{background:var(--surface2)}.task-row.done{opacity:.55}.task-row.done .task-name{text-decoration:line-through}.task-row .task-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}.task-row .task-info{flex:1;min-width:0}.task-row .task-name{font-weight:600;font-size:14px}.task-row .task-meta{font-size:11px;color:var(--text2);margin-top:1px}.task-row .task-score{font-weight:700;font-size:12px;white-space:nowrap;flex-shrink:0}.task-row .task-score.pos{color:var(--positive)}.task-row .task-score.neg{color:var(--negative)}.task-row .task-act{flex-shrink:0}.task-type-tag{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:700}.task-type-tag.t1{background:#a78bfa33;color:#c4b5fd}.task-type-tag.t2{background:#5ce0b833;color:#6ee7b7}.monitor-inline{display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:12px;color:var(--text2);border-top:1px dashed var(--border)}.monitor-inline a{color:var(--accent2);text-decoration:none}.monitor-inline a:hover{text-decoration:underline}.cal-heat{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:11px;font-weight:700;cursor:default;position:relative}.cal-cell.header{background:transparent;font-size:10px;color:var(--text2);font-weight:400}.cal-cell.empty{background:transparent}.cal-cell.today{box-shadow:0 0 0 2px var(--accent)}.cal-cell[data-pct="0"]{background:#1a1a2e33;color:var(--text2)}.cal-cell[data-pct="1"]{background:#16653444}.cal-cell[data-pct="2"]{background:#16653488}.cal-cell[data-pct="3"]{background:#22c55e88;color:#000}.cal-cell[data-pct="4"]{background:#22c55e;color:#000}.cal-cell[data-pct="5"]{background:#f59e0b;color:#000}.tree-container{padding:10px 0}.tree-node-wrapper{position:relative;padding-left:28px;margin:4px 0}.tree-node-wrapper.root{padding-left:0}.tree-node-wrapper::before{content:"";position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border);border-radius:1px}.tree-node-wrapper:last-child::before{bottom:50%}.tree-node-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .2s;position:relative}.tree-node-card:hover{border-color:var(--accent);box-shadow:0 0 8px rgba(167,139,250,.15)}.tree-node-card.mastered{border-color:var(--gold);background:#f59e0b0d}.tree-node-card .node-icon{font-size:22px;flex-shrink:0}.tree-node-card .node-body{flex:1;min-width:0}.tree-node-card .node-body .node-name{font-weight:700;font-size:14px}.tree-node-card .node-body .node-source{font-size:10px;color:var(--text2);margin-top:1px}.tree-node-card .node-mastered-badge{font-size:18px;flex-shrink:0}.tree-node-card .node-actions{display:none;gap:4px;flex-shrink:0}.tree-node-card:hover .node-actions{display:flex}.tree-node-children{padding-left:4px}.tree-connector{position:absolute;left:10px;top:50%;width:14px;height:2px;background:var(--border);border-radius:1px}.tree-node-wrapper.root>.tree-node-card{border-color:var(--accent);background:#a78bfa0d}.tree-node-wrapper.root::before{display:none}.tree-node-wrapper.root .tree-connector{display:none}.skill-node-modal-row{display:flex;gap:6px;align-items:flex-end}.skill-node-modal-row input{flex:1}
.phase-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.phase-cell{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:var(--radius-sm);border:2px dashed var(--border);min-width:80px;transition:all .3s}.phase-cell.done{border-color:var(--gold);border-style:solid;background:#f59e0b11;box-shadow:0 0 12px rgba(245,158,11,.15)}.phase-cell .phase-icon{font-size:22px}.phase-cell .phase-title{font-size:11px;font-weight:600;text-align:center}.phase-cell .phase-reward{font-size:10px;color:var(--gold)}.phase-cell .phase-check{font-size:18px}.ach-grid{display:flex;gap:10px;flex-wrap:wrap}.ach-card{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);min-width:70px}.ach-card.locked{opacity:.35;filter:grayscale(1)}.ach-card.unlocked{border-color:var(--accent);background:#a78bfa11}.ach-card .ach-icon{font-size:28px}.ach-card .ach-name{font-size:10px;font-weight:600;text-align:center}.section-title{font-size:13px;font-weight:700;color:var(--accent);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}.cat-chips{display:flex;gap:6px;flex-wrap:wrap}.cat-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:12px;font-weight:600;border:1px solid var(--border)}.cat-chip .cat-del{margin-left:2px;cursor:pointer;opacity:.5;font-size:14px}.cat-chip .cat-del:hover{opacity:1;color:var(--negative)}.setting-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px;border:1px solid var(--border)}.setting-row .sr-info{flex:1;min-width:0}.setting-row .sr-name{font-weight:600;font-size:13px}.setting-row .sr-meta{font-size:11px;color:var(--text2)}.penalty-editor{background:var(--bg);border-radius:var(--radius-sm);padding:12px;margin-top:8px;border:1px solid var(--border)}.penalty-editor label{display:block;font-size:11px;color:var(--text2);margin-bottom:2px}.penalty-editor input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text);font-size:13px;margin-bottom:6px}.penalty-editor .row{display:flex;gap:8px}.penalty-editor .row>*{flex:1}.btn{padding:7px 14px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:12px;transition:all .2s;white-space:nowrap}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(1.15)}.btn-success{background:var(--positive);color:#000}.btn-success:hover{filter:brightness(1.15)}.btn-danger{background:var(--negative);color:#fff}.btn-danger:hover{filter:brightness(1.15)}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent)}.btn-sm{padding:3px 10px;font-size:11px}.btn-xs{padding:2px 7px;font-size:10px;border-radius:4px}.btn-gold{background:var(--gold);color:#000}.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}.progress-fill{height:100%;border-radius:3px;transition:width .5s}.progress-fill.accent{background:linear-gradient(90deg,var(--accent),var(--accent2))}.progress-fill.gold{background:var(--gold)}.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:100;justify-content:center;align-items:center;padding:20px}.modal-overlay.show{display:flex}.modal{background:var(--surface);border-radius:var(--radius);padding:22px;border:1px solid var(--border);width:100%;max-width:480px;max-height:82vh;overflow-y:auto}.modal h2{margin-bottom:14px;font-size:17px}.form-g{margin-bottom:12px}.form-g label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px}.form-g input,.form-g select,.form-g textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}.form-g textarea{resize:vertical;min-height:50px}.form-g input:focus,.form-g select:focus,.form-g textarea:focus{outline:none;border-color:var(--accent)}.form-row{display:flex;gap:10px}.form-row .form-g{flex:1}.check-row{display:flex;align-items:center;gap:6px;font-size:12px}.check-row input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}.toast{position:fixed;top:16px;right:16px;background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:14px 18px;z-index:200;animation:slideIn .3s ease,fadeOut .5s 2.5s forwards;box-shadow:var(--shadow);max-width:300px}.toast.success{border-color:var(--positive)}.toast .tt{font-weight:700;font-size:13px}.toast .tm{font-size:12px;color:var(--text2);margin-top:3px}@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes fadeOut{to{opacity:0}}.empty-state{text-align:center;padding:36px 16px;color:var(--text2);font-size:13px}.empty-state .icon{font-size:36px;margin-bottom:6px}.xp-section{margin-top:10px}.xp-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}.xp-fill{height:100%;background:var(--xp-bar);border-radius:3px;transition:width .5s}.xp-text{font-size:10px;color:var(--text2);margin-top:2px}.miss-counter{font-size:11px;color:var(--warning)}.miss-counter.danger{color:var(--negative)}@media(max-width:600px){.nav-btn{font-size:11px;padding:7px 3px}.topbar{padding:10px 14px;font-size:12px;gap:10px}.card{padding:12px}}
</style>
</head>
<body>
<div class="app">
<div class="topbar" id="topbar">
  <span style="font-size:13px;color:var(--text2);">🔥</span>
  <span class="val gold" id="streak-num">0</span><span class="mini">天连签</span>
  <span class="sep"></span>
  <span class="val cyan" id="pts-num">0</span><span class="mini">XP</span>
  <span class="val purple" id="lvl-num">Lv.1</span>
  <button class="signin-btn" id="signin-btn" onclick="doCheckIn()">✨ 签到</button>
</div>
<nav class="nav">
  <button class="nav-btn active" data-tab="today">📋 今日</button>
  <button class="nav-btn" data-tab="calendar">📅 日历</button>
  <button class="nav-btn" data-tab="skilltree">🌳 技能树</button>
  <button class="nav-btn" data-tab="goals">🎯 长期目标</button>
  <button class="nav-btn" data-tab="merit">🏆 功勋墙</button>
  <button class="nav-btn" data-tab="settings">⚙️ 设定任务</button>
</nav>
<div class="tab-content active" id="tab-today">
  <div class="card" style="padding-bottom:10px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <h2 style="margin:0;">📋 今日概览</h2>
      <span style="font-size:13px;color:var(--text2);" id="today-summary-text"></span>
    </div>
    <div class="xp-section"><div class="xp-bar"><div class="xp-fill" id="xp-fill-top" style="width:0%"></div></div><div class="xp-text" id="xp-text-top"></div></div>
  </div>
  <div id="today-modules"></div>
</div>
<div class="tab-content" id="tab-calendar">
  <div class="card"><h2>📅 打卡热力图</h2><div style="font-size:12px;color:var(--text2);margin-bottom:8px;">颜色深浅 = 当天任务完成率</div><div id="calendar-heatmap"></div></div>
</div>
<div class="tab-content" id="tab-skilltree">
  <div class="card"><h2>🌳 我的技能树</h2><div style="font-size:12px;color:var(--text2);margin-bottom:12px;">每一个技能都来自你真实的坚持 · 点击节点操作</div><div id="skill-tree-container"></div><button class="btn btn-primary btn-sm" style="margin-top:10px;" onclick="openSkillNodeModal(null)">+ 种下根技能</button></div>
</div>
<div class="tab-content" id="tab-merit">
  <div class="card"><h2>🏆 成就徽章</h2><div class="ach-grid" id="merit-achievements"></div></div>
</div>
<div class="tab-content" id="tab-goals">
  <div class="card"><h2>🎯 长期目标</h2><div id="goals-container"></div><button class="btn btn-primary btn-sm" style="margin-top:10px;" onclick="openGoalModal()">+ 新建长期目标</button></div>
</div>
<div class="tab-content" id="tab-settings">
  <div class="card">
    <h2>📂 自定义分类</h2>
    <div class="cat-chips" id="settings-cats"></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <input type="text" id="new-cat-name" placeholder="分类名" style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;">
      <input type="text" id="new-cat-icon" placeholder="图标" style="width:60px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;" maxlength="2">
      <input type="color" id="new-cat-color" value="#a78bfa" style="width:36px;height:36px;border:none;cursor:pointer;">
      <button class="btn btn-primary btn-sm" onclick="addCategory()">+ 添加分类</button>
    </div>
  </div>
  <div class="section-title">① 打卡任务</div>
  <div id="settings-t1"></div>
  <button class="btn btn-primary btn-sm" style="margin-top:6px;" onclick="openTaskModal('habit')">+ 新建打卡任务</button>
  <div class="section-title">② 弹性任务</div>
  <div id="settings-t2"></div>
  <button class="btn btn-primary btn-sm" style="margin-top:6px;" onclick="openTaskModal('flexible')">+ 新建弹性任务</button>
  <div class="section-title">③ 长期目标（在功勋墙管理阶段）</div>
  <div id="settings-t3"></div>
  <button class="btn btn-primary btn-sm" style="margin-top:6px;" onclick="openGoalModal()">+ 新建长期目标</button>
  <div class="section-title">④ 监测提醒</div>
  <div id="settings-t4"></div>
  <div style="display:flex;gap:6px;margin-top:6px;">
    <button class="btn btn-primary btn-sm" onclick="openMonitorModal('reminder')">+ 更新提醒</button>
    <button class="btn btn-outline btn-sm" onclick="openMonitorModal('summary')">+ 数据总结</button>
  </div>
</div>

  <div class="card" style="margin-top:12px;">
    <h2>💾 数据备份</h2>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">定期备份，防止清理浏览器后数据丢失</p>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-primary btn-sm" onclick="exportBackup()">📥 导出备份</button>
      <label class="btn btn-outline btn-sm" style="cursor:pointer;margin:0;">📤 恢复备份 <input type="file" accept=".json" onchange="importBackup(this)" style="display:none;"></label>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal-content"></div></div>
<script>
const STORAGE_KEY='sdg_v3';
const TODAY=new Date().toISOString().split('T')[0];
const DEFAULT_CATS=[
  {id:'cat_body',name:'身体',icon:'💪',color:'#4ade80'},
  {id:'cat_study',name:'学习',icon:'📚',color:'#a78bfa'},
  {id:'cat_work',name:'工作',icon:'💼',color:'#f59e0b'}
];
const ACHIEVEMENTS=[
  {id:'a7',icon:'🔥',name:'7天连签',cond:()=>getStreak()>=7},
  {id:'a30',icon:'💎',name:'30天连签',cond:()=>getStreak()>=30},
  {id:'a100',icon:'👑',name:'百日连签',cond:()=>getStreak()>=100},
  {id:'p500',icon:'⭐',name:'500 XP',cond:()=>DATA.points>=500},
  {id:'p2k',icon:'🌟',name:'2000 XP',cond:()=>DATA.points>=2000},
  {id:'p10k',icon:'✨',name:'10000 XP',cond:()=>DATA.points>=10000},
  {id:'l5',icon:'⚔️',name:'Lv.5',cond:()=>getLevel()>=5},
  {id:'l10',icon:'🛡️',name:'Lv.10',cond:()=>getLevel()>=10},
  {id:'t50',icon:'📝',name:'50次完成',cond:()=>totalTaskCompletions()>=50},
  {id:'t200',icon:'🏅',name:'200次完成',cond:()=>totalTaskCompletions()>=200},
  {id:'g1',icon:'🎯',name:'首个阶段',cond:()=>DATA.goals.some(g=>g.phases.some(p=>p.completed))}
];
function getDefaultData(){return{signIns:{},points:0,tasks:[],goals:[],categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),earnedAchievements:[],skillRoots:[]}}
function loadData(){try{let d=JSON.parse(localStorage.getItem(STORAGE_KEY));if(!d)d=getDefaultData();const def=getDefaultData();for(const k of Object.keys(def))if(!(k in d))d[k]=def[k];if(!d.categories||d.categories.length===0)d.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));return d}catch(e){return getDefaultData()}}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(DATA))}
let DATA=loadData();let currentTab='today';
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function getLevel(){let lv=1;while(DATA.points>=xpFor(lv+1))lv++;return lv}
function xpFor(lv){return Math.floor(100*Math.pow(lv,1.6))}
function getXpProgress(){const lv=getLevel();const cur=DATA.points-xpFor(lv);const need=xpFor(lv+1)-xpFor(lv);return{level:lv,current:cur,needed:need,pct:need>0?Math.min(100,Math.floor(cur/need*100)):100}}
function getStreak(){let s=0;const d=new Date();if(DATA.signIns[TODAY]){while(DATA.signIns[d.toISOString().split('T')[0]]){s++;d.setDate(d.getDate()-1)}}else{d.setDate(d.getDate()-1);while(DATA.signIns[d.toISOString().split('T')[0]]){s++;d.setDate(d.getDate()-1)}}return s}
function totalTaskCompletions(){return DATA.tasks.reduce((sum,t)=>sum+Object.keys(t.completedDates||{}).length,0)}
function totalSignIns(){return Object.keys(DATA.signIns).length}
function totalPhasesDone(){let c=0;DATA.goals.forEach(g=>g.phases.forEach(p=>{if(p.completed)c++}));return c}
function doCheckIn(){if(DATA.signIns[TODAY])return;DATA.signIns[TODAY]=true;const s=getStreak();let bonus=5;if(s>=7&&s<30)bonus=15;else if(s>=30&&s<100)bonus=30;else if(s>=100)bonus=60;if(s===7)bonus+=50;if(s===30)bonus+=150;if(s===100)bonus+=500;DATA.points+=bonus;saveData();refreshAll();showToast('✨ 签到成功','连签 '+s+' 天，+'+bonus+' XP');checkAchievements()}
function isTaskDueToday(task){if(task.parentGoalId&&task.parentPhaseId){const goal=DATA.goals.find(g=>g.id===task.parentGoalId);if(!goal)return false;const phase=goal.phases.find(p=>p.id===task.parentPhaseId);if(!phase||phase.completed)return false;if(phase.startDate&&phase.startDate>TODAY)return false;if(phase.endDate&&phase.endDate<TODAY)return false}if(task.cycle==='daily')return true;if(task.cycle==='weekly')return true;if(task.cycle==='custom'){const created=new Date(task.createdAt||'2026-01-01');const diff=Math.floor((new Date(TODAY)-created)/86400000);return diff>=0&&diff%task.intervalDays===0}if(task.cycle==='deadline'){return task.deadlineDate&&task.deadlineDate>=TODAY&&!task.completedDates[TODAY]}return true}
function toggleTask(taskId){const task=DATA.tasks.find(t=>t.id===taskId);if(!task||task.type==='monitor')return;if(task.completedToday){task.completedToday=false;if(task.completedDates)delete task.completedDates[TODAY];DATA.points-=task.reward;if(task.type==='flexible')task.consecutiveMisses=(task.consecutiveMisses||0)+1}else{task.completedToday=true;if(!task.completedDates)task.completedDates={};task.completedDates[TODAY]=true;let pts=task.reward;DATA.points+=pts;if(task.type==='flexible')task.consecutiveMisses=0;showToast('✅ 任务完成',task.name+' +'+pts+' XP')}saveData();refreshAll();checkAchievements()}
function isTaskDueTodayOnDate(task,dateStr){if(task.cycle==='daily')return true;if(task.cycle==='weekly')return true;if(task.cycle==='custom'){const created=new Date(task.createdAt||'2026-01-01');const diff=Math.floor((new Date(dateStr)-created)/86400000);return diff>=0&&diff%task.intervalDays===0}return false}
function applyPenalties(){const todayTasks=DATA.tasks.filter(t=>isTaskDueToday(t)&&t.type!=='monitor');for(const task of DATA.tasks.filter(t=>t.type==='habit'&&isTaskDueToday(t))){if(task.lastPenaltyCheck===TODAY)continue;task.lastPenaltyCheck=TODAY;if(!task.penaltyRules)task.penaltyRules={reviewPeriod:7,completionThreshold:60,pointPenalty:50,realPenalty:''};const pr=task.penaltyRules;if(!pr.reviewPeriod||!pr.completionThreshold)continue;const end=new Date(TODAY);const start=new Date(TODAY);start.setDate(start.getDate()-pr.reviewPeriod);let due=0,done=0;for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){const ds=d.toISOString().split('T')[0];if(isTaskDueTodayOnDate(task,ds)){due++;if(task.completedDates[ds])done++}}if(due>0){const rate=Math.floor(done/due*100);if(rate<pr.completionThreshold){let penalty=pr.pointPenalty||50;DATA.points-=penalty;saveData();let msg='⚠️ '+task.name+' 近'+pr.reviewPeriod+'天完成率'+rate+'%，低于'+pr.completionThreshold+'%，扣'+penalty+' XP';if(pr.realPenalty)msg+='\n现实惩罚：'+pr.realPenalty;showToast('📉 惩罚触发',msg)}}}for(const task of DATA.tasks.filter(t=>t.type==='flexible'&&isTaskDueToday(t))){if(task.lastPenaltyCheck===TODAY)continue;task.lastPenaltyCheck=TODAY;if(!task.flexibleRules)task.flexibleRules={popPeriod:'weekly',popCount:3,completionThreshold:60,pointPenalty:100,realPenalty:''};const fr=task.flexibleRules;if(!fr.popPeriod||!fr.popCount)continue;const end=new Date(TODAY);let start=new Date(TODAY);if(fr.popPeriod==='weekly')start.setDate(start.getDate()-7);else if(fr.popPeriod==='monthly')start.setMonth(start.getMonth()-1);else continue;let due=0,done=0;for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){const ds=d.toISOString().split('T')[0];if(isTaskDueTodayOnDate(task,ds)){due++;if(task.completedDates[ds])done++}}if(due>=fr.popCount){const rate=Math.floor(done/due*100);if(rate<fr.completionThreshold){DATA.points-=fr.pointPenalty||100;saveData();let msg='⚠️ '+task.name+' 本周期完成率'+rate+'%，低于'+fr.completionThreshold+'%，扣'+fr.pointPenalty+' XP';if(fr.realPenalty)msg+='\n现实惩罚：'+fr.realPenalty;showToast('📉 弹性任务惩罚',msg)}}}for(const task of DATA.tasks.filter(t=>t.type==='habit'&&t.category==='negative'&&isTaskDueToday(t)&&!t.completedToday)){if(task.lastNegativePenalty===TODAY)continue;task.lastNegativePenalty=TODAY;let penalty=task.penalty||50;DATA.points-=penalty;saveData();showToast('🚫 未守住',task.name+' 扣'+penalty+' XP')}}

function findSkillNode(id,nodes){if(!nodes)nodes=DATA.skillRoots||[];for(const n of nodes){if(n.id===id)return n;const found=findSkillNode(id,n.children||[]);if(found)return found}return null}
function findParentNode(id,nodes){if(!nodes)nodes=DATA.skillRoots||[];for(const n of nodes){if((n.children||[]).some(c=>c.id===id))return n;const found=findParentNode(id,n.children||[]);if(found)return found}return null}
function openSkillNodeModal(parentId){const modal=document.getElementById('modal-content');const title=parentId?'➕ 添加分支技能':'🌱 种下根技能';modal.innerHTML='<h2>'+title+'</h2><form onsubmit="submitSkillNode(event,\''+(parentId||'')+'\')"><div class="form-g"><label>技能名称 *</label><input type="text" id="sn-name" required placeholder="例如：学会吉他"></div><div class="skill-node-modal-row"><div class="form-g"><label>图标</label><input type="text" id="sn-icon" value="🌱" maxlength="2" placeholder="🎸"></div></div>'+(parentId?'':'<div class="form-g"><label>来源说明（可选）</label><input type="text" id="sn-source" placeholder="例如：来自长期目标「健身计划」"></div>')+'<div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">确定</button></div></form>';document.getElementById('modal-overlay').classList.add('show')}
function submitSkillNode(event,parentId){event.preventDefault();const node={id:uid(),name:document.getElementById('sn-name').value.trim(),icon:document.getElementById('sn-icon').value.trim()||'🌱',source:(document.getElementById('sn-source')||{}).value||'',mastered:false,children:[],createdAt:TODAY};if(parentId){const parent=findSkillNode(parentId);if(parent){if(!parent.children)parent.children=[];parent.children.push(node)}else DATA.skillRoots.push(node)}else{DATA.skillRoots.push(node)}saveData();closeModal();refreshAll()}
function convertPhaseToSkill(goalId,phaseId){const goal=DATA.goals.find(g=>g.id===goalId);if(!goal)return;const phase=goal.phases.find(p=>p.id===phaseId);if(!phase||!phase.completed)return;if(!confirm('将阶段「'+phase.name+'」转化为技能节点吗？'))return;DATA.skillRoots.push({id:uid(),name:phase.name,icon:phase.reward?'🎯':'⭐',source:'来自长期目标「'+goal.name+'」',mastered:true,children:[],createdAt:TODAY,goalId,phaseId});saveData();refreshAll();showToast('🌳 已种入技能树','「'+phase.name+'」已添加为根技能')}
function toggleSkillMastered(id){const node=findSkillNode(id);if(!node)return;node.mastered=!node.mastered;saveData();refreshAll()}
function deleteSkillNode(id){const node=findSkillNode(id);if(!node)return;const hasChildren=(node.children||[]).length>0;const msg=hasChildren?'确定删除「'+node.name+'」及其所有分支吗？':'确定删除「'+node.name+'」吗？';if(!confirm(msg))return;const parent=findParentNode(id);if(parent)parent.children=(parent.children||[]).filter(c=>c.id!==id);else DATA.skillRoots=(DATA.skillRoots||[]).filter(n=>n.id!==id);saveData();refreshAll()}
function renderSkillNode(node,isRoot){const mastered=node.mastered;let html='<div class="tree-node-wrapper'+(isRoot?' root':'')+'">';html+='<div class="tree-connector"></div>';html+='<div class="tree-node-card'+(mastered?' mastered':'')+'" onclick="event.stopPropagation();">';html+='<div class="node-icon">'+escHtml(node.icon)+'</div>';html+='<div class="node-body"><div class="node-name">'+escHtml(node.name)+'</div>';if(node.source)html+='<div class="node-source">'+escHtml(node.source)+'</div>';html+='</div>';if(mastered)html+='<div class="node-mastered-badge">✅</div>';html+='<div class="node-actions">';html+='<button class="btn btn-xs btn-outline" onclick="event.stopPropagation();openSkillNodeModal(\''+node.id+'\')" title="添加分支">+</button>';html+='<button class="btn btn-xs btn-outline" onclick="event.stopPropagation();toggleSkillMastered(\''+node.id+'\')" title="'+(mastered?'取消掌握':'标记掌握')+'">'+(mastered?'🔄':'✔')+'</button>';html+='<button class="btn btn-xs btn-danger" onclick="event.stopPropagation();deleteSkillNode(\''+node.id+'\')" title="删除">✖</button>';html+='</div></div>';if(node.children&&node.children.length>0){html+='<div class="tree-node-children">'+node.children.map(c=>renderSkillNode(c,false)).join('')+'</div>'}html+='</div>';return html}
function refreshSkillTree(){const container=document.getElementById('skill-tree-container');if(!DATA.skillRoots||DATA.skillRoots.length===0){container.innerHTML='<div class="empty-state"><div class="icon">🌱</div>还没有技能，点击下方按钮种下第一个根技能</div>';return}container.innerHTML='<div class="tree-container">'+DATA.skillRoots.map(r=>renderSkillNode(r,true)).join('')+'</div>'}
function updateDebugBar(){var ds=document.getElementById("db-skills");var dg=document.getElementById("db-goals");var dt=document.getElementById("db-tasks");var dp=document.getElementById("db-points");if(ds)ds.textContent=(DATA.skillRoots||[]).length;if(dg)dg.textContent=(DATA.goals||[]).length;if(dt)dt.textContent=(DATA.tasks||[]).length;if(dp)dp.textContent=DATA.points||0;}function refreshAll(){refreshTopBar();refreshToday();refreshCalendar();refreshSkillTree();refreshGoals();refreshMerit();refreshSettings();updateDebugBar()}
function refreshTopBar(){const s=getStreak();const xp=getXpProgress();document.getElementById('streak-num').textContent=s;document.getElementById('pts-num').textContent=DATA.points;document.getElementById('lvl-num').textContent='Lv.'+xp.level;const btn=document.getElementById('signin-btn');if(DATA.signIns[TODAY]){btn.textContent='✅ 已签到';btn.classList.add('done')}else{btn.textContent='✨ 签到';btn.classList.remove('done')}document.getElementById('xp-fill-top').style.width=xp.pct+'%';document.getElementById('xp-text-top').textContent='Lv.'+xp.level+' → Lv.'+(xp.level+1)+' ('+xp.current+'/'+xp.needed+' XP)'}
function refreshToday(){applyPenalties();const container=document.getElementById('today-modules');const cats=DATA.categories||[];const allTasks=DATA.tasks.filter(t=>isTaskDueToday(t)&&t.type!=='monitor');const monitorTasks=DATA.tasks.filter(t=>t.type==='monitor');const totalDone=allTasks.filter(t=>t.completedToday).length;const totalAll=allTasks.length;document.getElementById('today-summary-text').textContent='已完成 '+totalDone+'/'+totalAll;if(cats.length===0){container.innerHTML='<div class="empty-state"><div class="icon">📂</div>请先在「设定任务」中添加分类</div>';return}let html='';for(const cat of cats){const catTasks=allTasks.filter(t=>t.categoryId===cat.id);const catMonitors=monitorTasks.filter(t=>t.categoryId===cat.id);if(catTasks.length===0&&catMonitors.length===0)continue;const catDone=catTasks.filter(t=>t.completedToday).length;const catTotal=catTasks.length;html+='<div class="cat-module" style="border-color:'+cat.color+'44;">';html+='<div class="cat-header" style="background:'+cat.color+'11;color:'+cat.color+';" onclick="this.parentElement.classList.toggle(\'collapsed\')">';html+='<span>'+escHtml(cat.icon)+' '+escHtml(cat.name)+'</span>';html+='<span class="cat-progress">'+catDone+'/'+catTotal+'</span>';html+='<span class="arrow">▼</span></div>';html+='<div class="cat-body">';for(const t of catTasks){const done=t.completedToday;const isNeg=t.type==='habit'&&t.category==='negative';let meta='';if(t.cycle==='weekly')meta='每周';else if(t.cycle==='custom')meta='每'+t.intervalDays+'天';else if(t.cycle==='deadline')meta='截止:'+t.deadlineDate;else meta='每日';if(isNeg)meta+=' · 需守住';let missInfo='';if(t.type==='flexible'){const m=t.consecutiveMisses||0;if(m>0)missInfo='<span class="miss-counter'+(m>=2?' danger':'')+'" style="margin-left:4px;">⚠ 连缺'+m+'次</span>'}let scoreHtml='';if(isNeg){scoreHtml='<span class="task-score pos">守住+'+t.reward+'</span><span class="task-score neg">破-'+t.penalty+'</span>'}else{scoreHtml='<span class="task-score pos">+'+t.reward+'</span>'}let parentInfo='';if(t.parentGoalId&&t.parentPhaseId){const goal=DATA.goals.find(g=>g.id===t.parentGoalId);if(goal){const ph=goal.phases.find(p=>p.id===t.parentPhaseId);if(ph)parentInfo=' <span style="font-size:10px;color:var(--text2);">· '+escHtml(goal.name)+' / '+escHtml(ph.name)+'</span>'}}const icon=isNeg?'🚫':'✅';const actLabel=done?'撤销':(isNeg?'守住了':'完成');const actCls=done?'btn-outline':(isNeg?'btn-success':'btn-success');html+='<div class="task-row'+(done?' done':'')+'"><span class="task-icon">'+icon+'</span><div class="task-info"><div class="task-name">'+escHtml(t.name)+parentInfo+'</div><div class="task-meta">'+meta+missInfo+'</div></div>'+scoreHtml+'<div class="task-act"><button class="btn '+actCls+' btn-xs" onclick="toggleTask(\''+t.id+'\')">'+actLabel+'</button></div></div>'}for(const m of catMonitors){const ack=m.lastAck===TODAY;const subLabel=m.subType==='reminder'?'🔔':'📊';html+='<div class="monitor-inline"><span>'+subLabel+'</span><span style="flex:1;">'+escHtml(m.name)+'</span>'+(m.url?'<a href="'+escHtml(m.url)+'" target="_blank">🔗</a>':'')+'<button class="btn btn-xs '+(ack?'btn-outline':'btn-primary')+'" onclick="ackMonitor(\''+m.id+'\')">'+(ack?'已查看':'去查看')+'</button></div>'}html+='</div></div>'}if(!html)html='<div class="empty-state"><div class="icon">🎉</div>今天没有待办任务</div>';container.innerHTML=html}
function refreshCalendar(){const container=document.getElementById('calendar-heatmap');const now=new Date();const year=now.getFullYear();const month=now.getMonth();const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();let html='<div class="cal-heat">';['日','一','二','三','四','五','六'].forEach(h=>html+='<div class="cal-cell header">'+h+'</div>');for(let i=0;i<firstDay;i++)html+='<div class="cal-cell empty"></div>';for(let d=1;d<=daysInMonth;d++){const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');const isToday=ds===TODAY;let due=0,done=0;for(const t of DATA.tasks){if(t.type==='monitor'||t.type==='habit')continue;if(isTaskDueTodayOnDate(t,ds)){due++;if(t.completedDates[ds])done++}}let pctLevel=0;if(due>0){const r=done/due;if(r>=1)pctLevel=5;else if(r>=0.75)pctLevel=4;else if(r>=0.5)pctLevel=3;else if(r>=0.25)pctLevel=2;else pctLevel=1}if(DATA.signIns[ds]&&pctLevel===0)pctLevel=1;let cls='cal-cell';if(isToday)cls+=' today';html+='<div class="'+cls+'" data-pct="'+pctLevel+'" title="'+ds+': '+done+'/'+due+'">'+d+'</div>'}html+='</div>';container.innerHTML=html}

function refreshMerit(){const ac=document.getElementById('merit-achievements');ac.innerHTML=ACHIEVEMENTS.map(a=>{const earned=DATA.earnedAchievements.includes(a.id);return'<div class="ach-card'+(earned?' unlocked':' locked')+'"><div class="ach-icon">'+a.icon+'</div><div class="ach-name">'+a.name+'</div></div>'}).join('')}
function refreshGoals(){const container=document.getElementById('goals-container');if(DATA.goals.length===0){container.innerHTML='<div class="empty-state"><div class="icon">🎯</div>还没有长期目标，点击下方按钮创建</div>';return}container.innerHTML=DATA.goals.map(goal=>{let phHtml=goal.phases.map(phase=>{const done=phase.completed;const phaseTasks=DATA.tasks.filter(t=>t.parentGoalId===goal.id&&t.parentPhaseId===phase.id);let taskList="";if(phaseTasks.length>0){taskList+="<div style=\"margin-top:6px;padding:4px 0;border-top:1px dashed var(--border);font-size:11px;color:var(--text2);\">📋 阶段任务:</div>";phaseTasks.forEach(pt=>{taskList+="<div style=\"font-size:11px;padding:2px 0;display:flex;justify-content:space-between;\"><span>"+(pt.type==="habit"?"✅":"②")+" "+escHtml(pt.name)+"</span><span style=\"color:"+(pt.type==="habit"?"var(--positive)":"var(--accent2)")+";\">+"+pt.reward+"XP</span></div>"})}return'<div class="phase-cell'+(done?' done':'')+'"><div class="phase-icon">'+(done?'⭐':'🔓')+'</div><div class="phase-title">'+escHtml(phase.name)+'</div><div class="phase-check">'+(done?'✅':'○')+'</div>'+(phase.reward?'<div class="phase-reward">🎁 '+escHtml(phase.reward)+'</div>':'')+(goal.reward?'<div style="font-size:10px;color:var(--gold);">🏆 终极奖励：'+escHtml(goal.reward)+'</div>':'')+(!done?'<button class="btn btn-gold btn-xs" style="margin-top:4px;" onclick="completePhase(\''+goal.id+'\',\''+phase.id+'\')">✔ 确认完成</button>':'')+(done?' <button class="btn btn-outline btn-xs" style="margin-top:4px;" onclick="convertPhaseToSkill(\''+goal.id+'\',\''+phase.id+'\')">🌳 种到技能树</button>':'')+(!done?'<div style="margin-top:4px;"><button class="btn btn-primary btn-xs" onclick="openTaskModal(\'phase\',{goalId:\''+goal.id+'\',phaseId:\''+phase.id+'\'})">+ 添加子任务</button></div>':'')+(done?'<button class="btn btn-danger btn-xs" style="margin-top:4px;" onclick="deletePhase(\''+goal.id+'\',\''+phase.id+'\')">删除</button>':'')+taskList+'</div>'}).join('');const pp=getGoalProgress(goal);return'<div class="goal-card"><div class="goal-title">🎯 '+escHtml(goal.name)+' <span style="font-size:11px;color:var(--text2);">'+pp.done+'/'+pp.total+' 阶段</span>'+(goal.reward?' <span style="font-size:10px;color:var(--gold);">🏆 '+escHtml(goal.reward)+'</span>':'')+'</div><div class="phase-grid">'+phHtml+'</div><div class="progress-bar"><div class="progress-fill accent" style="width:'+pp.pct+'%"></div></div><div style="margin-top:6px;"><button class="btn btn-outline btn-xs" onclick="openPhaseModal(\''+goal.id+'\')">+ 添加阶段</button> <button class="btn btn-danger btn-xs" onclick="deleteGoal(\''+goal.id+'\')">删除目标</button></div></div>'}).join('')}
function getGoalProgress(goal){const total=goal.phases.length;const done=goal.phases.filter(p=>p.completed).length;return{done,total,pct:total>0?Math.floor(done/total*100):0}}
function refreshSettings(){const cc=document.getElementById('settings-cats');cc.innerHTML=(DATA.categories||[]).map(c=>'<span class="cat-chip" style="background:'+c.color+'22;border-color:'+c.color+'44;color:'+c.color+';">'+escHtml(c.icon)+' '+escHtml(c.name)+'<span class="cat-del" onclick="deleteCategory(\''+c.id+'\')">&times;</span></span>').join('');const t1c=document.getElementById('settings-t1');const t1=DATA.tasks.filter(t=>t.type==='habit'&&!t.parentGoalId);if(t1.length===0)t1c.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px 0;">暂无打卡任务</div>';else t1c.innerHTML=t1.map(t=>{const pr=t.penaltyRules||{reviewPeriod:7,completionThreshold:60,pointPenalty:50,realPenalty:''};return'<div class="setting-row"><span class="task-type-tag t1">'+(t.category==='negative'?'🚫':'✅')+' '+(t.deletable?'可删':'🔒')+'</span><div class="sr-info"><div class="sr-name">'+escHtml(t.name)+'</div><div class="sr-meta">'+(t.cycle==='daily'?'每日':t.cycle==='weekly'?'每周':'每'+t.intervalDays+'天')+' · 奖+'+t.reward+' · 惩-'+t.penalty+' · 考核'+pr.reviewPeriod+'天/阈值'+pr.completionThreshold+'%</div></div><button class="btn btn-outline btn-xs" onclick="editPenalty(\''+t.id+'\')">📝 惩罚</button><button class="btn btn-danger btn-xs" onclick="deleteTask(\''+t.id+'\')" '+(t.deletable?'':'disabled style="opacity:.4;cursor:not-allowed;"')+'>'+(t.deletable?'删除':'🔒')+'</button></div>'}).join('');const t2c=document.getElementById('settings-t2');const t2=DATA.tasks.filter(t=>t.type==='flexible'&&!t.parentGoalId);if(t2.length===0)t2c.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px 0;">暂无弹性任务</div>';else t2c.innerHTML=t2.map(t=>{const fr=t.flexibleRules||{popPeriod:'weekly',popCount:3,completionThreshold:60,pointPenalty:100,realPenalty:''};return'<div class="setting-row"><span class="task-type-tag t2">②</span><div class="sr-info"><div class="sr-name">'+escHtml(t.name)+'</div><div class="sr-meta">奖+'+t.reward+' · '+fr.popPeriod+'/'+fr.popCount+'次 · 阈值'+fr.completionThreshold+'% · 罚-'+fr.pointPenalty+'</div></div><button class="btn btn-outline btn-xs" onclick="editFlexRules(\''+t.id+'\')">📝 规则</button><button class="btn btn-danger btn-xs" onclick="deleteTask(\''+t.id+'\')">删除</button></div>'}).join('');const t3c=document.getElementById('settings-t3');if(DATA.goals.length===0)t3c.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px 0;">暂无长期目标</div>';else t3c.innerHTML=DATA.goals.map(g=>{const pp=getGoalProgress(g);return'<div class="setting-row"><span class="task-type-tag" style="background:#f59e0b33;color:#fbbf24;">③</span><div class="sr-info"><div class="sr-name">'+escHtml(g.name)+'</div><div class="sr-meta">'+pp.done+'/'+pp.total+' 阶段完成</div></div><button class="btn btn-outline btn-xs" onclick="openPhaseModal(\''+g.id+'\')">+ 阶段</button><button class="btn btn-danger btn-xs" onclick="deleteGoal(\''+g.id+'\')">删除</button></div>'}).join('');const t4c=document.getElementById('settings-t4');const t4=DATA.tasks.filter(t=>t.type==='monitor');if(t4.length===0)t4c.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px 0;">暂无监测项</div>';else t4c.innerHTML=t4.map(t=>'<div class="setting-row"><span class="task-type-tag" style="background:#f8717133;color:#fca5a5;">④</span><div class="sr-info"><div class="sr-name">'+escHtml(t.name)+'</div><div class="sr-meta">'+(t.subType==='reminder'?'🔔 更新提醒':'📊 数据总结')+'</div></div><button class="btn btn-danger btn-xs" onclick="deleteTask(\''+t.id+'\')">删除</button></div>').join('')}
function openTaskModal(type,ctx){ctx=ctx||{};const modal=document.getElementById('modal-content');const labels={habit:'新建打卡任务',flexible:'新建弹性任务',phase:'新建子任务'};const isHabit=type==='habit';const isPhase=type==='phase';let catOpts=(DATA.categories||[]).map(c=>'<option value="'+c.id+'">'+c.icon+' '+c.name+'</option>').join('');modal.innerHTML='<h2>'+labels[type]+'</h2><form onsubmit="submitTask(event,\''+type+'\',\''+(ctx.goalId||'')+'\',\''+(ctx.phaseId||'')+'\')"><div class="form-g"><label>任务名称 *</label><input type="text" id="tf-name" required placeholder="例如：运动30分钟"></div><div class="form-g"><label>所属分类</label><select id="tf-cat">'+catOpts+'</select></div>'+(isHabit?'<div class="form-g"><label>类型</label><select id="tf-cat-type"><option value="positive">✅ 坚持做的事</option><option value="negative">🚫 坚持不做的事</option></select></div>':'')+'<div class="form-g"><label>完成奖励 (XP)</label><input type="number" id="tf-reward" value="'+(isPhase?'30':isHabit?'20':'30')+'" min="0" required></div><div class="form-g"><label>失败惩罚 (XP)</label><input type="number" id="tf-penalty" value="'+(isPhase?'0':isHabit?'50':'100')+'" min="0" required></div><div class="form-g"><label>周期</label><select id="tf-cycle" onchange="toggleCycleOpts()"><option value="daily">每天</option><option value="weekly">每周</option><option value="custom">自定义间隔</option><option value="deadline">截止日期</option></select></div><div class="form-g" id="tf-int-group" style="display:none;"><label>间隔天数</label><input type="number" id="tf-interval" value="2" min="1"></div><div class="form-g" id="tf-dead-group" style="display:none;"><label>截止日期</label><input type="date" id="tf-deadline" value="'+TODAY+'"></div>'+(isHabit?'<div class="form-g check-row"><input type="checkbox" id="tf-deletable" checked><label>允许删除此任务</label><span style="font-size:10px;color:var(--text2);">（不勾选则设定后不可删除）</span></div>':'')+'<div class="form-g check-row"><input type="checkbox" id="tf-remind"><label>开启提醒</label></div><div class="form-g" id="tf-remind-group" style="display:none;"><label>提醒时间</label><input type="time" id="tf-remind-time" value="09:00"></div><div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">创建任务</button></div></form>';document.getElementById('modal-overlay').classList.add('show');const rc=document.getElementById('tf-remind');if(rc)rc.addEventListener('change',function(){document.getElementById('tf-remind-group').style.display=this.checked?'block':'none'})}function toggleCycleOpts(){const el=document.getElementById('tf-cycle');if(!el)return;const v=el.value;document.getElementById('tf-int-group').style.display=v==='custom'?'block':'none';document.getElementById('tf-dead-group').style.display=v==='deadline'?'block':'none'}
function submitTask(event,type,goalId,phaseId){event.preventDefault();const task={id:uid(),type,name:document.getElementById('tf-name').value.trim(),categoryId:document.getElementById('tf-cat').value,category:(document.getElementById('tf-cat-type')||{}).value||'positive',cycle:document.getElementById('tf-cycle').value,intervalDays:parseInt((document.getElementById('tf-interval')||{}).value)||1,deadlineDate:(document.getElementById('tf-deadline')||{}).value||'',reward:parseInt(document.getElementById('tf-reward').value)||0,penalty:parseInt(document.getElementById('tf-penalty').value)||0,deletable:document.getElementById('tf-deletable')?document.getElementById('tf-deletable').checked:true,reminderEnabled:document.getElementById('tf-remind').checked||false,reminderTime:document.getElementById('tf-remind-time').value||'',completedToday:false,completedDates:{},consecutiveMisses:0,createdAt:TODAY,parentGoalId:goalId||null,parentPhaseId:phaseId||null,penaltyRules:type==='habit'?{reviewPeriod:7,completionThreshold:60,pointPenalty:50,realPenalty:''}:null,flexibleRules:type==='flexible'?{popPeriod:'weekly',popCount:3,completionThreshold:60,pointPenalty:100,realPenalty:''}:null,isPhaseTask:type==='phase'};DATA.tasks.push(task);saveData();closeModal();refreshAll();if(task.reminderEnabled)requestNotifPerm()}
function editPenalty(taskId){const task=DATA.tasks.find(t=>t.id===taskId);if(!task)return;const pr=task.penaltyRules||{reviewPeriod:7,completionThreshold:60,pointPenalty:50,realPenalty:''};const modal=document.getElementById('modal-content');modal.innerHTML='<h2>📝 编辑惩罚规则 - '+escHtml(task.name)+'</h2><div class="penalty-editor"><div class="row"><div class="form-g"><label>考核周期（天）</label><input type="number" id="pe-period" value="'+pr.reviewPeriod+'" min="1"></div><div class="form-g"><label>完成率阈值（%）</label><input type="number" id="pe-threshold" value="'+pr.completionThreshold+'" min="0" max="100"></div></div><div class="form-g"><label>积分惩罚 (XP)</label><input type="number" id="pe-points" value="'+pr.pointPenalty+'" min="0"></div><div class="form-g"><label>现实惩罚描述</label><input type="text" id="pe-real" value="'+escAttr(pr.realPenalty)+'" placeholder="例如：一周不能喝奶茶"></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="savePenalty(\''+taskId+'\')">保存</button></div></div>';document.getElementById('modal-overlay').classList.add('show')}
function savePenalty(taskId){const task=DATA.tasks.find(t=>t.id===taskId);if(!task)return;task.penaltyRules={reviewPeriod:parseInt(document.getElementById('pe-period').value)||7,completionThreshold:parseInt(document.getElementById('pe-threshold').value)||60,pointPenalty:parseInt(document.getElementById('pe-points').value)||50,realPenalty:document.getElementById('pe-real').value.trim()};saveData();closeModal();refreshAll()}
function editFlexRules(taskId){const task=DATA.tasks.find(t=>t.id===taskId);if(!task)return;const fr=task.flexibleRules||{popPeriod:'weekly',popCount:3,completionThreshold:60,pointPenalty:100,realPenalty:''};const modal=document.getElementById('modal-content');modal.innerHTML='<h2>📝 编辑弹性规则 - '+escHtml(task.name)+'</h2><div class="penalty-editor"><div class="row"><div class="form-g"><label>弹出周期</label><select id="fe-period"><option value="weekly"'+(fr.popPeriod==='weekly'?' selected':'')+'>每周</option><option value="monthly"'+(fr.popPeriod==='monthly'?' selected':'')+'>每月</option></select></div><div class="form-g"><label>周期内弹出次数</label><input type="number" id="fe-count" value="'+fr.popCount+'" min="1"></div></div><div class="form-g"><label>完成率阈值（%）</label><input type="number" id="fe-threshold" value="'+fr.completionThreshold+'" min="0" max="100"></div><div class="form-g"><label>积分惩罚 (XP)</label><input type="number" id="fe-points" value="'+fr.pointPenalty+'" min="0"></div><div class="form-g"><label>现实惩罚描述</label><input type="text" id="fe-real" value="'+escAttr(fr.realPenalty)+'" placeholder="例如：一周不能打游戏"></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveFlexRules(\''+taskId+'\')">保存</button></div></div>';document.getElementById('modal-overlay').classList.add('show')}
function saveFlexRules(taskId){const task=DATA.tasks.find(t=>t.id===taskId);if(!task)return;task.flexibleRules={popPeriod:document.getElementById('fe-period').value,popCount:parseInt(document.getElementById('fe-count').value)||3,completionThreshold:parseInt(document.getElementById('fe-threshold').value)||60,pointPenalty:parseInt(document.getElementById('fe-points').value)||100,realPenalty:document.getElementById('fe-real').value.trim()};saveData();closeModal();refreshAll()}
function openGoalModal(){const modal=document.getElementById("modal-content");modal.innerHTML='<h2>🎯 新建长期目标</h2><form onsubmit="submitGoal(event)"><div class="form-g"><label>目标名称 *</label><input type="text" id="gf-name" required placeholder="例如：学习 Rust"></div><div class="form-g"><label>终极奖励</label><input type="text" id="gf-reward" placeholder="例如：Switch一台 · 完成全部阶段后获得"></div><div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">创建目标</button></div></form>';document.getElementById('modal-overlay').classList.add('show')}function submitGoal(event){event.preventDefault();DATA.goals.push({id:uid(),name:document.getElementById('gf-name').value.trim(),reward:(document.getElementById('gf-reward')||{}).value||'',phases:[],createdAt:TODAY});saveData();closeModal();refreshAll()}
function openPhaseModal(goalId){const modal=document.getElementById('modal-content');modal.innerHTML='<h2>➕ 添加阶段</h2><form onsubmit="submitPhase(event,\''+goalId+'\')"><div class="form-g"><label>阶段名称 *</label><input type="text" id="pf-name" required placeholder="例如：基础语法学习"></div><div class="form-g"><label>描述</label><textarea id="pf-desc" placeholder="这个阶段要达成什么？"></textarea></div><div class="form-row"><div class="form-g"><label>开始日期</label><input type="date" id="pf-start" value="'+TODAY+'"></div><div class="form-g"><label>结束日期</label><input type="date" id="pf-end" value="'+TODAY+'"></div></div><div class="form-g check-row"><input type="checkbox" id="pf-unlimited" onchange="document.getElementById(\'pf-end\').disabled=this.checked"><label>无限期（不设截止日期）</label></div><div class="form-g"><label>现实奖励</label><input type="text" id="pf-reward" placeholder="例如：Switch一台"></div><div class="form-g"><label>阶段完成 XP 奖励</label><input type="number" id="pf-points" value="100" min="0"></div><div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">添加阶段</button></div></form>';document.getElementById('modal-overlay').classList.add('show')}
function submitPhase(event,goalId){event.preventDefault();const goal=DATA.goals.find(g=>g.id===goalId);if(!goal)return;goal.phases.push({id:uid(),name:document.getElementById('pf-name').value.trim(),description:document.getElementById('pf-desc').value.trim(),startDate:document.getElementById('pf-start').value,endDate:document.getElementById('pf-unlimited').checked?'2099-12-31':document.getElementById('pf-end').value,reward:document.getElementById('pf-reward').value.trim(),phaseReward:parseInt(document.getElementById('pf-points').value)||0,completed:false});saveData();closeModal();refreshAll()}
function completePhase(goalId,phaseId){const goal=DATA.goals.find(g=>g.id===goalId);if(!goal)return;const phase=goal.phases.find(p=>p.id===phaseId);if(!phase||phase.completed)return;if(!confirm('确认完成阶段「'+phase.name+'」吗？\n奖励：'+(phase.reward||'无')))return;phase.completed=true;DATA.points+=phase.phaseReward||0;saveData();refreshAll();if(phase.reward)showToast('🎁 阶段完成','恭喜获得：'+phase.reward);checkAchievements()}
function openMonitorModal(subType){const modal=document.getElementById('modal-content');const isR=subType==='reminder';let catOpts=(DATA.categories||[]).map(c=>'<option value="'+c.id+'">'+c.icon+' '+c.name+'</option>').join('');modal.innerHTML='<h2>'+(isR?'🔔 添加更新提醒':'📊 添加数据总结')+'</h2><form onsubmit="submitMonitor(event,\''+subType+'\')"><div class="form-g"><label>名称 *</label><input type="text" id="mf-name" required placeholder="'+(isR?'例如：阮一峰博客':'例如：每周健身数据')+'"></div><div class="form-g"><label>所属分类</label><select id="mf-cat">'+catOpts+'</select></div>'+(isR?'<div class="form-g"><label>链接</label><input type="url" id="mf-url" placeholder="https://..."></div>':'')+'<div class="form-g"><label>备注</label><textarea id="mf-notes" placeholder="补充说明..."></textarea></div>'+(!isR?'<div class="form-g"><label>数据内容</label><textarea id="mf-data" placeholder="粘贴你要跟踪的数据..."></textarea></div><div class="form-g"><label>上传图片/文档</label><input type="file" id="mf-file" accept="image/*,.pdf,.doc,.docx,.txt,.md" onchange="handleMonitorFile(this)"><div id="mf-file-preview" style="margin-top:4px;font-size:11px;color:var(--text2);"></div></div>':'')+'<div class="form-g check-row"><input type="checkbox" id="mf-remind" '+(isR?'checked':'')+'><label>开启定时提醒</label></div><div class="form-g" id="mf-remind-group" style="'+(isR?'':'display:none;')+'"><label>提醒时间</label><input type="time" id="mf-remind-time" value="09:00"></div><div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">添加</button></div></form>';document.getElementById('modal-overlay').classList.add('show');const rc=document.getElementById('mf-remind');if(rc)rc.addEventListener('change',function(){document.getElementById('mf-remind-group').style.display=this.checked?'block':'none'})}

function handleMonitorFile(input){const preview=document.getElementById('mf-file-preview');if(!input.files||!input.files[0]){preview.textContent='';return}const file=input.files[0];if(file.size>4*1024*1024){preview.textContent='文件过大（限制4MB）';input.value='';return}const reader=new FileReader();reader.onload=function(e){preview.innerHTML='已选择: '+file.name+' ('+Math.round(file.size/1024)+'KB) <span style="color:var(--positive);">✓</span>';window._monitorFileData=e.target.result;window._monitorFileName=file.name};reader.readAsDataURL(file)}function submitMonitor(event,subType){event.preventDefault();const task={id:uid(),type:'monitor',subType,name:document.getElementById('mf-name').value.trim(),categoryId:document.getElementById('mf-cat').value,url:(document.getElementById('mf-url')||{}).value||'',notes:(document.getElementById('mf-notes')||{}).value||'',dataContent:(document.getElementById('mf-data')||{}).value||'',fileData:window._monitorFileData||null,fileName:window._monitorFileName||'',reminderEnabled:(document.getElementById('mf-remind')||{}).checked||false,reminderTime:(document.getElementById('mf-remind-time')||{}).value||'',completedToday:false,completedDates:{},createdAt:TODAY};DATA.tasks.push(task);saveData();closeModal();refreshAll();if(task.reminderEnabled)requestNotifPerm()}
function ackMonitor(id){const task=DATA.tasks.find(t=>t.id===id);if(!task)return;task.lastAck=TODAY;saveData();refreshAll()}
function addCategory(){const name=document.getElementById('new-cat-name').value.trim();if(!name)return;const icon=document.getElementById('new-cat-icon').value.trim()||'📁';const color=document.getElementById('new-cat-color').value||'#a78bfa';DATA.categories.push({id:uid(),name,icon,color});document.getElementById('new-cat-name').value='';document.getElementById('new-cat-icon').value='';saveData();refreshAll()}
function deleteCategory(id){if(!confirm('确定删除此分类？该分类下的任务不会被删除。'))return;DATA.categories=DATA.categories.filter(c=>c.id!==id);DATA.tasks.forEach(t=>{if(t.categoryId===id)t.categoryId=DATA.categories[0]?DATA.categories[0].id:''});saveData();refreshAll()}
function deleteTask(id){const task=DATA.tasks.find(t=>t.id===id);if(!task)return;if(!task.deletable&&task.type==='habit'){showToast('🔒','此任务设定为不可删除');return}if(!confirm('确定删除任务「'+task.name+'」吗？'))return;DATA.tasks=DATA.tasks.filter(t=>t.id!==id);saveData();refreshAll()}
function deleteGoal(id){if(!confirm('确定删除此长期目标及其所有阶段吗？'))return;DATA.goals=DATA.goals.filter(g=>g.id!==id);DATA.tasks=DATA.tasks.filter(t=>t.parentGoalId!==id);saveData();refreshAll()}
function deletePhase(goalId,phaseId){if(!confirm('确定删除此阶段及其子任务吗？'))return;const goal=DATA.goals.find(g=>g.id===goalId);if(!goal)return;goal.phases=goal.phases.filter(p=>p.id!==phaseId);DATA.tasks=DATA.tasks.filter(t=>!(t.parentGoalId===goalId&&t.parentPhaseId===phaseId));saveData();refreshAll()}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show')}
function checkAchievements(){let n=false;for(const a of ACHIEVEMENTS){if(!DATA.earnedAchievements.includes(a.id)&&a.cond()){DATA.earnedAchievements.push(a.id);n=true;showToast('🏆 成就解锁',a.icon+' '+a.name)}}if(n)saveData()}
function requestNotifPerm(){if(!('Notification' in window))return;if(Notification.permission==='default')Notification.requestPermission()}
function checkReminders(){if(!('Notification' in window)||Notification.permission!=='granted')return;const now=new Date();const ct=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');for(const t of DATA.tasks){if(!t.reminderEnabled||!t.reminderTime||t.lastReminderDate===TODAY)continue;if(t.reminderTime===ct){if(t.type==='monitor'){new Notification('📡 监测提醒',{body:'该查看「'+t.name+'」了！'+(t.url?'\n'+t.url:'')})}else if(isTaskDueToday(t)&&!t.completedToday){new Notification('⏰ 自律提醒',{body:'该去做「'+t.name+'」了！'})}t.lastReminderDate=TODAY}}saveData()}
function escHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function escAttr(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showToast(t,m){const el=document.createElement('div');el.className='toast success';el.innerHTML='<div class="tt">'+t+'</div><div class="tm">'+m+'</div>';document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}
function init(){document.addEventListener("submit",function(e){e.preventDefault()});if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(()=>console.log('SW registered')).catch(()=>{})}document.querySelectorAll('.nav-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentTab=btn.dataset.tab;document.querySelectorAll('.tab-content').forEach(tc=>tc.classList.remove('active'));const tabEl=document.getElementById('tab-'+currentTab);if(tabEl)tabEl.classList.add('active');refreshAll()})});for(const t of DATA.tasks)t.completedToday=!!t.completedDates[TODAY];if(!DATA.categories||DATA.categories.length===0)DATA.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));refreshAll();checkAchievements();requestNotifPerm();setInterval(checkReminders,30000);applyPenalties()}

function exportBackup(){const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="discipline-realm-backup-"+new Date().toISOString().split("T")[0]+".json";a.click();URL.revokeObjectURL(url);showToast("✅ 备份已下载")}
